name: Monthly US POI Database Refresher

on:
  schedule:
    # Triggers at 00:00 (Midnight) on day 1 of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows you to manually click a button in GitHub to force run it anytime

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository files so the environment can access the scripts
    - name: Check out repository code
      uses: actions/checkout@v4

    # Step 2: Provision a clean Python 3.10 runtime environment
    - name: Set up Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Install the required network communication libraries
    - name: Install script dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # Step 4: Run your script (Ensure your python file is named exactly 'scraper.py' or update below)
    - name: Run national database compiler
      run: python scraper.py

    # Step 5: Commit and push the freshly generated us_brands.json back to your live hosting branch
    - name: Commit and push updated dataset
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add us_brands.json
        
        # Only commit if changes were actually found, preventing broken execution logs
        git diff-index --quiet HEAD || (git commit -m "Automated Monthly POI Database Sync" && git push)
