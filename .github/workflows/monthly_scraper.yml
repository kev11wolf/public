name: Monthly US POI Database Refresher

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install script dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run national database compiler
      run: python -u scraper.py

    - name: Commit and push updated dataset
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add us_brands.json
        git diff-index --quiet HEAD || (git commit -m "Automated Monthly POI Database Sync" && git pull --rebase origin main && git push)
