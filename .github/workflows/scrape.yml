name: Multi-State Automated Data Pipeline Matrix

on:
  schedule:
    - cron: '0 0 1 * *' # Automated pass on the 1st day of every month
  workflow_dispatch:     # Keeps manual execution force button enabled

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3 # Polite crawling throttling boundary limits
      fail-fast: false
      matrix:
        # State identifiers mapped precisely to Geofabrik sub-directories
        state: [
    north-carolina
        ]

    permissions:
      contents: write

    steps:
    - name: Checkout Source Code Tree
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Initialize Environment Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Architecture Requirements
      run: |
        sudo apt-get update && sudo apt-get install -y libexpat1-dev zlib1g-dev libbz2-dev
        python -m pip install --upgrade pip
        pip install requests osmium

    - name: Stream Target State Map Slice From Mirror
      run: |
        curl -L -o region_map.osm.pbf https://download.geofabrik.de/north-america/us/${{ matrix.state }}-latest.osm.pbf

    - name: Execute Native Multi-State Matrix Extraction Pass
      run: python fetch_data_pbf.py ${{ matrix.state }}

    - name: Clean Scratchpad Workspace File Storage Assets
      run: rm -f region_map.osm.pbf

    - name: Deploy Compiled Matrix Array Safely
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Explicit target tracking for the specific modified state file
        git add data/${{ matrix.state }}_brands.json
        
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated database layer compilation run complete for target state: ${{ matrix.state }}"
          
          # Retry loop loop with rebase to manage concurrent push merges gracefully
          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break || sleep 15
          done
        fi
