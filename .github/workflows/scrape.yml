name: Stream Native Map Extraction Pipeline

on:
  schedule:
    - cron: '0 0 1 * *' # Executes automatically on the 1st day of every month
  workflow_dispatch:     # Keeps manual execution force button ready

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code Tree
      uses: actions/checkout@v4

    - name: Initialize Environment Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Architecture Requirements
      run: |
        python -m pip install --upgrade pip
        pip install requests pyosmium

    - name: Stream Target State Map Slice
      # Targets North Carolina. Change link path to scale or modify target territories.
      run: |
        curl -L -o region_map.osm.pbf https://download.geofabrik.de/north-america/us/north-carolina-latest.osm.pbf

    - name: Trigger Processing Script Execution Layer
      run: python fetch_data_pbf.py

    - name: Clean Scratchpad Workspace File Storage Assets
      run: rm -f region_map.osm.pbf

    - name: Deploy Compiled Matrix Array
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add us_brands.json
        git diff-index --quiet HEAD || git commit -m "Automated update of index layers via offline binary maps engine"
        git push
