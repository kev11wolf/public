name: Update US Brands Data

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at Midnight
  workflow_dispatch:     # Manual run button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Robust Script
      run: python fetch_data.py

    - name: Commit and Push changes safely
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Ensure we don't drop out if file addition staging is tricky
        git add us_brands.json
        
        # Only commit if actual modifications/additions were found
        git diff-index --quiet HEAD || git commit -m "Automated append of new unique NC location records"
        git push
