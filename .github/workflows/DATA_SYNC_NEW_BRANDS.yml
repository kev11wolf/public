name: Sync Contributed Map Data
on:
  issues:
    types: [opened]

jobs:
  append_discovered_brands:
    if: contains(github.event.issue.title, 'DATA_SYNC_NEW_BRANDS')
    runs-on: ubuntu-latest
    
    # Securely grants permission for the bot to write changes back to your repository
    permissions:
      contents: write
    
    # Fixes the 2026 Node.js deprecation warning across the runner
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Append Objects To Base File
        env:
          # Passing the body via environment variable prevents text quotes injection from breaking code syntax
          ISSUE_BODY: ${{ github.event.issue.body }}
        # FIXES EXIT CODE 127: Tells the runner to execute this step using the Python interpreter directly
        shell: python
        run: |
          import json
          import os
          import sys

          issue_body = os.environ.get("ISSUE_BODY", "").strip()
          if not issue_body:
              print("Empty issue body discovered.")
              sys.exit(0)

          try:
              new_items = json.loads(issue_body)
          except Exception as e:
              print(f"Failed to parse JSON issue body data payload: {e}")
              sys.exit(1)

          file_path = "us_brands.json"
          existing_data = []
          if os.path.exists(file_path):
              with open(file_path, "r", encoding="utf-8") as f:
                  try:
                      existing_data = json.load(f)
                  except Exception:
                      existing_data = []

          # Avoid coordinates collision duplicates safely
          existing_coords = {f"{round(x['lat'], 4)}_{round(x['lon'], 4)}" for x in existing_data if 'lat' in x and 'lon' in x}
          
          added_count = 0
          for item in new_items:
              if 'lat' not in item or 'lon' not in item:
                  continue
              coord_key = f"{round(item['lat'], 4)}_{round(item['lon'], 4)}"
              if coord_key not in existing_coords:
                  existing_data.append(item)
                  existing_coords.add(coord_key)
                  added_count += 1

          print(f"Adding {added_count} brand modifications safely to file.")
          
          with open(file_path, "w", encoding="utf-8") as f:
              json.dump(existing_data, f, indent=2)

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add us_brands.json
          # Conditional check prevents actions pipeline crashing if 0 new unique elements are added
          git diff-index --quiet HEAD || git commit -m "Auto-append live POI discoveries from UI contributions"
          git push
