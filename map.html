<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>High-Performance Dynamic Route Explorer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111827;
        }
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Force-remove text directions itinerary layout panels completely */
        .leaflet-routing-container, .leaflet-routing-error, .leaflet-right {
            display: none !important;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Modern tightly bound popup layout to prevent content spillover */
        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 16px;
            padding: 2px;
            max-width: 250px !important;
            overflow: hidden;
        }
        .custom-popup .leaflet-popup-content {
            margin: 8px !important;
            max-width: 234px !important;
        }
    </style>
</head>
<body class="flex flex-col justify-end">

    <div class="absolute top-0 left-0 right-0 z-10 bg-white/95 backdrop-blur-md border-b border-gray-200 safe-top shadow-md flex flex-col transition-all duration-300">
        
        <div id="search-container" class="px-4 pt-3 pb-2 flex flex-col gap-2">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <div class="relative">
                    <input id="start-input" type="text" autocomplete="off" placeholder="Start Address, City, State, Zip Code" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]">
                    <div id="start-autocomplete" class="absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-lg hidden max-h-48 overflow-y-auto z-50 text-sm shadow-xl"></div>
                </div>
                <div class="relative">
                    <input id="end-input" type="text" autocomplete="off" placeholder="Destination Address, City, State, Zip Code" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]">
                    <div id="end-autocomplete" class="absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-lg hidden max-h-48 overflow-y-auto z-50 text-sm shadow-xl"></div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="route-btn" class="flex-1 bg-gray-900 active:bg-black text-white text-xs font-bold py-2 px-4 rounded-xl min-h-[44px] shadow-sm transition-all flex items-center justify-center gap-1">
                    🗺️ Calculate Dynamic Route
                </button>
            </div>
        </div>

        <div class="px-4 py-2 flex justify-between items-center gap-2 border-t border-gray-100 bg-gray-50/50">
            <div class="flex items-center gap-2 flex-1 min-w-0">
                <div id="status-spinner" class="animate-spin rounded-full h-3.5 w-3.5 border-2 border-blue-600 border-t-transparent hidden"></div>
                <p id="status" class="text-xs font-bold text-gray-500 truncate">System ready for routing input values.</p>
            </div>
            <div class="flex items-center gap-1.5 shrink-0">
                <select id="buffer-select" class="bg-white text-gray-700 text-xs font-bold py-2 px-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 min-h-[44px]">
                    <option value="4000" selected>⏱️ 5 Min</option>
                    <option value="12000">⏱️ 15 Min</option>
                    <option value="24000">⏱️ 30 Min</option>
                </select>
                <button id="toggle-search-btn" class="bg-white border border-gray-200 text-gray-700 text-xs font-bold px-3 py-2 rounded-xl min-h-[44px]">
                    🔍 Inputs
                </button>
                <button id="geo-btn" class="bg-blue-600 active:bg-blue-700 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]">
                    📍 Track
                </button>
            </div>
        </div>

        <div id="master-filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pt-2 pb-1.5 border-t border-gray-100">
            <button data-cat="playground" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🛝 Playgrounds</button>
            <button data-cat="gas" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">⛽ Gas Stations</button>
            <button data-cat="food" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🍔 Fast Food</button>
            <button data-cat="highway" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🏢 Highway Amenities</button>
            <button data-cat="tourism" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🌲 Tourism Exploration</button>
        </div>

        <div id="sub-filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pb-3 pt-1.5 border-t border-gray-100 bg-gray-50/70 hidden"></div>
    </div>

    <div id="map"></div>

    <div id="toast-container" class="absolute bottom-6 right-4 left-4 sm:left-auto z-50 flex flex-col gap-2 pointer-events-none max-w-sm safe-bottom"></div>

    <script>
        const MAP_INITIAL_CENTER = [35.7796, -78.6382]; 
        const CACHE_PREFIX = 'route_pois_v12_';
        
        // Failover Pool of free public global Overpass API endpoints
        const OVERPASS_MIRRORS = [
            "https://overpass-api.de/api/interpreter",
            "https://overpass.kumi.systems/api/interpreter",
            "https://overpass.osm.ch/api/interpreter"
        ];
        
        const categoryConfigs = {
            playground: { label: '🛝', bg: 'bg-emerald-600 border-emerald-200 text-white', name: 'Public Playground', query: 'node["leisure"="playground"]["access"!~"private|no"];way["leisure"="playground"]["access"!~"private|no"];', img: 'https://images.unsplash.com/photo-1596464716127-f2a82984de30?auto=format&fit=crop&w=300&q=80' },
            gas: { label: '⛽', bg: 'bg-amber-600 border-amber-200 text-white', name: 'Gas Station', query: 'node["brand"~"Murphy Express|Sheetz|Buc-ee\'s|Costco|Wawa|Circle K",i];node["name"~"Murphy Express|Sheetz|Buc-ee\'s|Costco|Wawa|Circle K",i];', img: 'https://images.unsplash.com/photo-1527018601619-a508a2be00cd?auto=format&fit=crop&w=300&q=80' },
            food: { label: '🍟', bg: 'bg-red-600 border-red-200 text-white', name: 'Fast Food', query: 'node["brand"~"McDonald\'s|Wendy\'s|Chick-fil-A|Chipotle|Jersey Mike|Raising Cane",i];node["name"~"McDonald\'s|Wendy\'s|Chick-fil-A|Raising Cane|Jersey Mike|Chipotle",i];', img: 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=300&q=80' },
            highway_rest: { label: '🛣️', bg: 'bg-blue-600 border-blue-200 text-white', name: 'Rest Area', query: 'node["highway"="rest_area"];', img: 'https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?auto=format&fit=crop&w=300&q=80' },
            highway_toilets: { label: '🧻', bg: 'bg-indigo-600 border-indigo-200 text-white', name: 'Public Restroom', query: 'node["amenity"="toilets"];', img: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=300&q=80' },
            tourism_viewpoint: { label: '📷', bg: 'bg-sky-500 border-sky-200 text-white', name: 'Scenic Viewpoint', query: 'node["tourism"="viewpoint"];', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=300&q=80' },
            tourism_dogpark: { label: '🐕', bg: 'bg-violet-600 border-violet-200 text-white', name: 'Dog Park', query: 'node["leisure"="dog_park"];', img: 'https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=300&q=80' }
        };

        const subMenuDefinitions = {
            playground: [{ id: 'all', label: 'All Public Parks' }],
            gas: [{ id: 'all', label: 'All Selected Chains' }, { id: 'unl87', label: 'UNL 87 Listed' }, { id: 'unl88', label: 'UNL 88 / E15' }],
            food: [{ id: 'all', label: 'All Brands' }, { id: 'raisingcanes', label: "Cane's" }, { id: 'chickfila', label: 'Chick-fil-A' }, { id: 'mcdonalds', label: "McDonald's" }, { id: 'jerseymikes', label: "Jersey Mike's" }],
            highway: [{ id: 'highway_rest', label: 'Highway Rest Areas' }, { id: 'highway_toilets', label: 'Standalone Restrooms' }],
            tourism: [{ id: 'tourism_viewpoint', label: 'Scenic Overlooks' }, { id: 'tourism_dogpark', label: 'Fenced Dog Parks' }]
        };

        let allPoiMarkers = [];
        let rawPoiDataMemory = []; 
        let routeLineCoordinates = [];
        let userMarker = null;
        let currentMasterCat = null;
        let currentSubFilter = 'all';
        let activeBufferMeters = 4000; 
        let cachedCategoriesFetched = new Set();

        const map = L.map('map', { zoomControl: false, tap: true, preferCanvas: true }).setView(MAP_INITIAL_CENTER, 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        const createCustomIcon = (label, classes, isLarge = false) => {
            const sizeClass = isLarge ? 'w-11 h-11 text-xl border-3' : 'w-8 h-8 text-sm border-2';
            const sizePx = isLarge ? 44 : 32;
            return L.divIcon({
                html: `<div class="flex items-center justify-center rounded-full shadow-md font-bold ${sizeClass} ${classes}">${label}</div>`,
                className: '', iconSize: [sizePx, sizePx], iconAnchor: [sizePx / 2, sizePx / 2], popupAnchor: [0, -sizePx / 4]
            });
        };

        // Embedded Hardware Accelerated Multi-threaded Calculation Web Worker
        const workerBlobCode = `
            function isChurchProperty(tags) {
                if (tags.amenity === 'place_of_worship' || tags.religion) return true;
                const text = (tags.name || '').toLowerCase();
                return ['church', 'chapel', 'ministry', 'baptist', 'methodist', 'lutheran', 'presbyterian', 'catholic', 'parish', 'fellowship', 'christian'].some(k => text.includes(k));
            }

            function parseTargetCategory(tags) {
                if (tags.leisure === 'playground') return isChurchProperty(tags) ? 'excluded' : 'playground';
                if (tags.highway === 'rest_area') return 'highway_rest';
                if (tags.amenity === 'toilets') return 'highway_toilets';
                if (tags.tourism === 'viewpoint') return 'tourism_viewpoint';
                if (tags.leisure === 'dog_park') return 'tourism_dogpark';

                const signature = ((tags.name || '') + ' ' + (tags.brand || '')).toLowerCase();
                if (['murphy express', 'sheetz', 'bucee', 'buc-ee', 'costco', 'wawa', 'circle k'].some(brand => signature.includes(brand))) return 'gas';
                if (['mcdonald', 'wendy', 'chick-fil-a', 'chick fil a', 'chipotle', 'jersey mike', 'raising cane'].some(brand => signature.includes(brand))) return 'food';
                return 'excluded';
            }

            function haversineDist(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
            }

            self.onmessage = function(e) {
                const { elements, targetsSlice, activeBufferMeters, currentMasterCat, currentSubFilter } = e.data;
                const validMatches = [];

                elements.forEach(element => {
                    const lat = element.lat || (element.center && element.center.lat);
                    const lon = element.lon || (element.center && element.center.lon);
                    if (!lat || !lon) return;

                    const tags = element.tags || {};
                    const concreteCat = parseTargetCategory(tags);
                    if (concreteCat === 'excluded') return;

                    if (currentMasterCat === 'highway' && concreteCat !== 'highway_rest' && concreteCat !== 'highway_toilets') return;
                    if (currentMasterCat === 'tourism' && concreteCat !== 'tourism_viewpoint' && concreteCat !== 'tourism_dogpark') return;
                    if (currentMasterCat !== 'highway' && currentMasterCat !== 'tourism' && concreteCat !== currentMasterCat) return;

                    if (currentSubFilter !== 'all') {
                        if (currentMasterCat === 'highway' || currentMasterCat === 'tourism') {
                            if (concreteCat !== currentSubFilter) return;
                        } else if (currentMasterCat === 'gas') {
                            if (currentSubFilter === 'unl87' && tags["fuel:octane_87"] !== 'yes' && tags["fuel:unleaded"] !== 'yes') return;
                            if (currentSubFilter === 'unl88' && tags["fuel:octane_88"] !== 'yes' && tags["fuel:e15"] !== 'yes') return;
                        } else if (currentMasterCat === 'food') {
                            const label = ((tags.name || '') + ' ' + (tags.brand || '')).toLowerCase().replace(/[^a-z]/g, '');
                            if (!label.includes(currentSubFilter)) return;
                        }
                    }

                    let minD = Infinity;
                    for (let j = 0; j < targetsSlice.length; j++) {
                        const d = haversineDist(lat, lon, targetsSlice[j].lat, targetsSlice[j].lng);
                        if (d < minD) minD = d;
                    }

                    if (minD <= activeBufferMeters) {
                        element.concreteCat = concreteCat;
                        element.minD = minD;
                        validMatches.push(element);
                    }
                });

                validMatches.sort((a, b) => a.minD - b.minD);
                self.postMessage({ validMatches });
            };
        `;
        const blobObj = new Blob([workerBlobCode], { type: 'application/javascript' });
        const mathWorker = new Worker(URL.createObjectURL(blobObj));

        function triggerToast(text, duration = 3000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "bg-gray-900/95 backdrop-blur-sm text-white text-xs font-semibold px-4 py-3 rounded-xl shadow-lg flex items-center transition-all duration-300 opacity-0 translate-y-2 pointer-events-auto";
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 50);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-1');
                setTimeout(() => { toast.remove(); }, 300);
            }, duration);
        }

        function updateInlineStatus(text, showSpinner = false) {
            document.getElementById('status').innerText = text;
            const spinner = document.getElementById('status-spinner');
            if (showSpinner) spinner.classList.remove('hidden');
            else spinner.classList.add('hidden');
        }

        let routingControl = L.Routing.control({
            show: false, addWaypoints: false, draggableWaypoints: false,
            createMarker: (i, wp) => L.marker(wp.latLng, { icon: createCustomIcon(i === 0 ? '🏁' : '⛰️', 'bg-black border-white text-white font-bold', false) })
        }).addTo(map);

        routingControl.on('routesfound', function(e) {
            routeLineCoordinates = e.routes[0].coordinates;
            document.getElementById('search-container').classList.add('hidden');
            
            rawPoiDataMemory = []; cachedCategoriesFetched.clear();
            allPoiMarkers.forEach(m => map.removeLayer(m.marker)); allPoiMarkers = [];
            hideSubMenu();
            updateInlineStatus("Route ready. Tap filters below.");
            triggerToast("Route generated. Content deferred until filter selection.");
        });

        function initAutocomplete(inputId, dropdownId) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            let debounceTimer;

            input.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                const query = input.value;
                if (query.length < 3) { dropdown.classList.add('hidden'); return; }

                debounceTimer = setTimeout(() => {
                    fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=4&addressdetails=1&q=${encodeURIComponent(query)}`, {
                        headers: { 'User-Agent': 'High-Performance-Mobile-Map-Corridor-App' }
                    })
                    .then(res => res.json())
                    .then(data => {
                        dropdown.innerHTML = '';
                        if (data.length === 0) { dropdown.classList.add('hidden'); return; }
                        dropdown.classList.remove('hidden');
                        
                        data.forEach(item => {
                            let tokens = []; const addr = item.address;
                            if (addr) {
                                const line1 = addr.house_number && addr.road ? `${addr.house_number} ${addr.road}` : (addr.road || '');
                                const city = addr.city || addr.town || addr.village || addr.suburb || '';
                                const state = addr.state || '';
                                const zip = addr.postcode || '';
                                if (line1) tokens.push(line1);
                                if (city) tokens.push(city);
                                if (state) tokens.push(state);
                                if (zip) tokens.push(zip);
                            }
                            const cleanString = tokens.length > 0 ? tokens.join(', ') : item.display_name.split(',').slice(0, 3).join(',');
                            const option = document.createElement('div');
                            option.className = "px-3 py-2.5 hover:bg-gray-100 active:bg-gray-200 border-b border-gray-100 last:border-0 cursor-pointer truncate text-gray-700 font-medium";
                            option.innerText = cleanString;
                            option.addEventListener('click', () => {
                                input.value = cleanString;
                                input.dataset.lat = item.lat; input.dataset.lon = item.lon;
                                dropdown.classList.add('hidden');
                            });
                            dropdown.appendChild(option);
                        });
                    }).catch(() => {});
                }, 400);
            });
        }

        initAutocomplete('start-input', 'start-autocomplete');
        initAutocomplete('end-input', 'end-autocomplete');

        function enforceCacheEviction(newKey, payload) {
            try {
                let keys = [];
                for (let i = 0; i < localStorage.length; i++) {
                    if (localStorage.key(i).startsWith(CACHE_PREFIX)) keys.push(localStorage.key(i));
                }
                if (keys.length >= 15) { keys.sort(); localStorage.removeItem(keys[0]); }
                localStorage.setItem(newKey, JSON.stringify(payload));
            } catch (e) { localStorage.clear(); }
        }

        // Network Request Execution Wrapper with Automatic Multi-Server Failover Routing Engine
        async function fetchWithMirrorFailover(queryPayload) {
            for (let i = 0; i < OVERPASS_MIRRORS.length; i++) {
                const endpoint = OVERPASS_MIRRORS[i];
                const targetUrl = endpoint + "?data=" + encodeURIComponent(queryPayload);
                try {
                    updateInlineStatus(`Querying Server Layer [${i+1}/${OVERPASS_MIRRORS.length}]...`, true);
                    const response = await fetch(targetUrl);
                    if (response.ok) {
                        return await response.json();
                    }
                    console.warn(`Endpoint mirror [${endpoint}] rejected payload parameters. Retrying alternative route channel.`);
                } catch (err) {
                    console.warn(`Connection timeout or CORS blocking met on mirror link [${endpoint}]. Advancing loop allocation.`);
                }
            }
            throw new Error("All public Overpass data servers are currently busy or congested.");
        }

        // Hardened Segment Pipeline preventing massive scale server timeouts
        async function fetchPOIsForCategory(masterCat) {
            if (routeLineCoordinates.length === 0) { alert("Calculate a route first."); return; }
            if (cachedCategoriesFetched.has(masterCat)) { evaluateAndRenderFilteredPOIs(); return; }

            updateInlineStatus("Slicing trip coordinates...", true);
            
            // Chunk long trips down into 4 isolated segments to eliminate Server Timeout bounds
            const segmentCount = 4;
            const pointsPerSegment = Math.ceil(routeLineCoordinates.length / segmentCount);
            const boundingBoxes = [];

            for (let i = 0; i < routeLineCoordinates.length; i += pointsPerSegment) {
                const chunk = routeLineCoordinates.slice(i, i + pointsPerSegment + 25);
                let minLat = Infinity, minLon = Infinity, maxLat = -Infinity, maxLon = -Infinity;
                chunk.forEach(c => {
                    if (c.lat < minLat) minLat = c.lat; if (c.lng < minLon) minLon = c.lng;
                    if (c.lat > maxLat) maxLat = c.lat; if (c.lng > maxLon) maxLon = c.lng;
                });
                boundingBoxes.push({
                    south: (minLat - 0.22).toFixed(4), west: (minLon - 0.22).toFixed(4),
                    north: (maxLat + 0.22).toFixed(4), east: (maxLon + 0.22).toFixed(4)
                });
            }

            let structuralQueries = [];
            if (masterCat === 'highway' || masterCat === 'tourism') {
                subMenuDefinitions[masterCat].forEach(sub => { structuralQueries.push(categoryConfigs[sub.id].query); });
            } else { structuralQueries.push(categoryConfigs[masterCat].query); }
            const combinedUnionQuery = structuralQueries.join('');

            updateInlineStatus("Checking offline disk store...", true);
            const firstBox = boundingBoxes[0];
            const lastBox = boundingBoxes[boundingBoxes.length - 1];
            const targetCacheKey = `${CACHE_PREFIX}${masterCat}_${firstBox.south}_${firstBox.west}_${lastBox.north}_${lastBox.east}`;
            const cachedData = localStorage.getItem(targetCacheKey);

            if (cachedData) {
                updateInlineStatus("Stops rendered.");
                cachedCategoriesFetched.add(masterCat);
                rawPoiDataMemory.push(...JSON.parse(cachedData));
                evaluateAndRenderFilteredPOIs();
                return;
            }

            let temporaryCollection = [];
            
            // SEQUENTIAL EXECUTION LOOP: Resolves bounding segments one after another to eliminate network congestion limits
            try {
                for (let k = 0; k < boundingBoxes.length; k++) {
                    const box = boundingBoxes[k];
                    updateInlineStatus(`Downloading sub-zone segment [${k + 1}/${boundingBoxes.length}]...`, true);
                    
                    const queryPayload = `[out:json][timeout:35][bbox:${box.south},${box.west},${box.north},${box.east}];(${combinedUnionQuery});out center;`;
                    
                    // Route request payload through the automatic mirror failover channel wrapper
                    const responseData = await fetchWithMirrorFailover(queryPayload);
                    if (responseData && responseData.elements) {
                        temporaryCollection.push(...responseData.elements);
                    }
                }

                // Strip localized duplicates out across merged segment arrays
                const baseMemoryIds = new Set(rawPoiDataMemory.map(el => el.id));
                const filteredNewElements = [];

                temporaryCollection.forEach(el => {
                    if (!baseMemoryIds.has(el.id)) {
                        baseMemoryIds.add(el.id);
                        filteredNewElements.push(el);
                        rawPoiDataMemory.push(el);
                    }
                });

                enforceCacheEviction(targetCacheKey, filteredNewElements);
                cachedCategoriesFetched.add(masterCat);
                
                updateInlineStatus("Stops rendered.");
                evaluateAndRenderFilteredPOIs();

            } catch (err) {
                updateInlineStatus("All servers congested.");
                triggerToast("Data channels currently unavailable. Try changing filters or waiting a brief moment.");
                console.error(err);
            }
        }

        function evaluateAndRenderFilteredPOIs() {
            updateInlineStatus("Offloading coordinate check to Worker...", true);
            const sliceRate = 45; const targetsSlice = [];
            for(let i = 0; i < routeLineCoordinates.length; i += sliceRate) { targetsSlice.push(routeLineCoordinates[i]); }
            if (routeLineCoordinates.length > 0) targetsSlice.push(routeLineCoordinates[routeLineCoordinates.length - 1]);

            mathWorker.postMessage({
                elements: rawPoiDataMemory, targetsSlice: targetsSlice,
                activeBufferMeters: activeBufferMeters, currentMasterCat: currentMasterCat, currentSubFilter: currentSubFilter
            });
        }

        mathWorker.onmessage = function(e) {
            const { validMatches } = e.data;
            allPoiMarkers.forEach(item => map.removeLayer(item.marker));
            allPoiMarkers = [];
            const isLarge = map.getZoom() > 13;

            validMatches.forEach(element => {
                const lat = element.lat || (element.center && element.center.lat);
                const lon = element.lon || (element.center && element.center.lon);
                const tags = element.tags || {};
                const concreteCat = element.concreteCat;
                const config = categoryConfigs[concreteCat] || categoryConfigs['food'];

                let name = tags.name || config.name;
                let hours = tags.opening_hours || "Hours not listed (Check online)";
                let description = tags.description || `${config.name} facility mapped along route.`;

                if (concreteCat === 'gas') {
                    const has87 = (tags["fuel:octane_87"] === 'yes' || tags["fuel:unleaded"] === 'yes') ? '✅ Yes' : '❓ Unverified';
                    const has88 = (tags["fuel:octane_88"] === 'yes' || tags["fuel:e15"] === 'yes') ? '✅ Yes' : '❌ No/Unverified';
                    description = `<div class="text-[10px] bg-gray-50 p-1.5 rounded-lg border border-gray-100 my-1"><p>⛽ <b>UNL 87:</b> ${has87}</p><p>⚡ <b>UNL 88 (E15):</b> ${has88}</p></div>`;
                }

                const appleMapsUrl = `https://maps.apple.com/?daddr=${lat},${lon}`;
                const streetViewUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lon}`;
                const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(name + ' ' + (tags.addr_city || ''))}`;

                const popupContent = `
                    <div class="w-full font-sans p-0.5">
                        <img src="${config.img}" class="w-full h-24 object-cover rounded-lg mb-2 shadow-sm" onerror="this.style.display='none'">
                        <h3 class="text-xs font-bold text-gray-900 truncate">${name}</h3>
                        <div class="text-[11px] text-gray-500 leading-tight my-1">${description}</div>
                        <div class="border-t border-gray-100 pt-1.5 mt-1.5">
                            <span class="text-[9px] uppercase font-bold text-gray-400 block tracking-wider">Hours</span>
                            <p class="text-xs text-gray-700 italic font-medium truncate">${hours}</p>
                        </div>
                        <div class="mt-3 flex flex-col gap-1.5">
                            <a href="${appleMapsUrl}" target="_blank" class="block text-center bg-blue-600 text-white text-[11px] font-bold py-2 rounded-xl min-h-[38px] flex items-center justify-center pointer-events-auto shadow-sm">🗺️ Route in Apple Maps</a>
                            <a href="${streetViewUrl}" target="_blank" class="block text-center bg-gray-900 text-white text-[11px] font-bold py-2 rounded-xl min-h-[38px] flex items-center justify-center pointer-events-auto shadow-sm">👁️ Google Street View</a>
                            <a href="${googleSearchUrl}" target="_blank" class="block text-center bg-gray-100 border border-gray-200 text-gray-700 text-[11px] font-bold py-2 rounded-xl min-h-[38px] flex items-center justify-center pointer-events-auto">🌐 Search Web & Reviews</a>
                        </div>
                    </div>
                `;

                const marker = L.marker([lat, lon], { icon: createCustomIcon(config.label, config.bg, isLarge) })
                    .bindPopup(popupContent, { 
                        className: 'custom-popup', autoPan: true,
                        autoPanPaddingTopLeft: L.point(15, 230), autoPanPaddingBottomRight: L.point(15, 25), maxWidth: 250
                    });

                allPoiMarkers.push({ marker: marker, category: concreteCat });
                marker.addTo(map);
            });

            updateInlineStatus("Stops rendered.");
            triggerToast(`Rendered ${validMatches.length} distance-sorted stops.`);
        };

        map.on('zoomend', () => {
            const isLarge = map.getZoom() > 13;
            allPoiMarkers.forEach(item => {
                const config = categoryConfigs[item.category] || categoryConfigs['food'];
                item.marker.setIcon(createCustomIcon(config.label, config.bg, isLarge));
            });
        });

        function handleMasterCategorySelection(element) {
            document.querySelectorAll('.master-pill').forEach(btn => btn.className = "master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]");
            element.className = "master-pill bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm whitespace-nowrap min-h-[44px]";
            currentMasterCat = element.getAttribute('data-cat'); currentSubFilter = 'all'; 
            generateSubMenuUI(currentMasterCat); fetchPOIsForCategory(currentMasterCat);
        }

        function generateSubMenuUI(catId) {
            const subBar = document.getElementById('sub-filter-bar'); subBar.innerHTML = '';
            const definition = subMenuDefinitions[catId]; if (!definition) { subBar.classList.add('hidden'); return; }
            definition.forEach((sub, index) => {
                const subButton = document.createElement('button'); subButton.setAttribute('data-sub', sub.id);
                subButton.className = index === 0 ? "sub-pill bg-gray-900 text-white text-xs font-bold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]" : "sub-pill bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]";
                subButton.innerText = sub.label; subBar.appendChild(subButton);
            });
            subBar.classList.remove('hidden');
        }

        function hideSubMenu() {
            document.getElementById('sub-filter-bar').classList.add('hidden');
            document.querySelectorAll('.master-pill').forEach(btn => btn.className = "master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]");
            currentMasterCat = null; currentSubFilter = 'all';
        }

        document.getElementById('master-filter-bar').addEventListener('click', (e) => { const pill = e.target.closest('.master-pill'); if (pill) handleMasterCategorySelection(pill); });
        document.getElementById('sub-filter-bar').addEventListener('click', (e) => {
            const subPill = e.target.closest('.sub-pill'); if (!subPill) return;
            document.querySelectorAll('.sub-pill').forEach(btn => btn.className = "sub-pill bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]");
            subPill.className = "sub-pill bg-gray-900 text-white text-xs font-bold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]";
            currentSubFilter = subPill.getAttribute('data-sub'); evaluateAndRenderFilteredPOIs();
        });

        document.getElementById('buffer-select').addEventListener('change', (e) => { activeBufferMeters = parseInt(e.target.value); if (rawPoiDataMemory.length > 0) evaluateAndRenderFilteredPOIs(); });
        document.getElementById('toggle-search-btn').addEventListener('click', () => { document.getElementById('search-container').classList.toggle('hidden'); });

        document.getElementById('route-btn').addEventListener('click', async () => {
            const startInput = document.getElementById('start-input'); const endInput = document.getElementById('end-input'); let startLatLng, endLatLng;
            if (startInput.dataset.lat && startInput.dataset.lon) { startLatLng = L.latLng(parseFloat(startInput.dataset.lat), parseFloat(startInput.dataset.lon)); }
            if (endInput.dataset.lat && endInput.dataset.lon) { endLatLng = L.latLng(parseFloat(endInput.dataset.lat), parseFloat(endInput.dataset.lon)); }
            if (!startLatLng || !endLatLng) { alert("Select suggested options inside autocomplete list layouts first."); return; }
            routingControl.setWaypoints([startLatLng, endLatLng]);
        });

        const geoBtn = document.getElementById('geo-btn'); let isTracking = false, watchId = null;
        geoBtn.addEventListener('click', () => {
            if (isTracking) { if (watchId) navigator.geolocation.clearWatch(watchId); isTracking = false; geoBtn.innerText = "📍 Track"; geoBtn.className = "bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]"; }
            else {
                if (!navigator.geolocation) { alert("GPS hardware unavailable."); return; }
                geoBtn.innerText = "🛑 Stop"; geoBtn.className = "bg-red-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]"; isTracking = true;
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    if (!userMarker) { userMarker = L.marker([latitude, longitude], { icon: createCustomIcon('🚗', 'bg-blue-500 border-white text-white', false) }).addTo(map); } else { userMarker.setLatLng([latitude, longitude]); }
                    map.panTo([latitude, longitude]);
                }, () => { isTracking = false; }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
            }
        });
    </script>
</body>
</html>
