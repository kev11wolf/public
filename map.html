<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>High-Performance Hybrid Route Explorer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111827;
        }
        #map { height: 100%; width: 100%; z-index: 1; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .leaflet-routing-container, .leaflet-routing-error, .leaflet-right { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .leaflet-map-pane {
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 14px; padding: 1px; max-width: 210px !important;
            overflow: hidden; background-color: #ffffff;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        .custom-popup .leaflet-popup-content { margin: 6px !important; max-width: 198px !important; }
        .custom-popup .leaflet-popup-content a, .custom-popup .leaflet-popup-content button {
            color: #ffffff !important; text-decoration: none !important;
        }

        .route-callout-marker {
            transition: transform 0.2s ease-in-out;
        }
        .route-callout-marker:hover {
            transform: scale(1.05);
            z-index: 9999 !important;
        }
    </style>
</head>
<body class="flex flex-col justify-end text-zinc-950 selection:bg-blue-500 selection:text-white">

    <div id="apple-navigation-hud" class="absolute top-4 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-lg bg-slate-900/95 backdrop-blur-md text-white rounded-2xl shadow-2xl p-4 border border-slate-700/50 flex items-center gap-4 transition-all duration-500 transform -translate-y-48 hidden select-none">
        <div id="hud-turn-icon" class="w-12 h-12 bg-emerald-600 rounded-xl flex items-center justify-center text-3xl font-black shrink-0 shadow-md">⬆️</div>
        <div class="flex-1 min-w-0">
            <h2 id="hud-turn-instruction" class="text-sm font-black tracking-tight leading-tight uppercase truncate text-slate-100">Proceed onto route Corridor</h2>
            <p id="hud-turn-distance" class="text-xs text-emerald-400 font-bold mt-0.5">Calculating segment threshold...</p>
        </div>
        <div class="text-right shrink-0 border-l border-slate-700 pl-3">
            <span class="text-[9px] uppercase font-black tracking-widest text-slate-400 block">Next Step</span>
            <p id="hud-next-step-preview" class="text-[11px] font-bold text-amber-400 max-w-[90px] truncate mt-0.5">---</p>
        </div>
    </div>

    <div id="master-header-panel" class="absolute top-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-b border-gray-200 safe-top shadow-md flex flex-col transition-all duration-300">
        
        <div id="search-container" class="px-4 pt-3 pb-2 flex flex-col gap-2">
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                <div class="relative flex-1">
                    <input id="start-input" type="text" autocomplete="off" placeholder="Start Address, City, State, Zip Code" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl pl-3 pr-16 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px] text-zinc-900 font-medium">
                    <button id="start-clear-btn" type="button" class="absolute right-9 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-red-500 transition-colors font-bold text-xs hidden">✕</button>
                    <button id="start-locate-btn" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-blue-600 transition-colors">📍</button>
                    <div id="start-autocomplete" class="absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-2xl hidden max-h-48 overflow-y-auto z-50 text-sm"></div>
                </div>
                
                <button id="swap-locations-btn" type="button" class="self-center p-2 bg-gray-100 hover:bg-gray-200 text-gray-700 active:scale-95 rounded-xl text-sm font-bold transition-all min-h-[44px] min-w-[44px] flex items-center justify-center shadow-sm">⇆</button>
                
                <div class="relative flex-1">
                    <input id="end-input" type="text" autocomplete="off" placeholder="Destination Address, City, State, Zip Code" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl pl-3 pr-16 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px] text-zinc-900 font-medium">
                    <button id="end-clear-btn" type="button" class="absolute right-9 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-red-500 transition-colors font-bold text-xs hidden">✕</button>
                    <button id="end-locate-btn" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-blue-600 transition-colors">📍</button>
                    <div id="end-autocomplete" class="absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-2xl hidden max-h-48 overflow-y-auto z-50 text-sm"></div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="route-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded-xl min-h-[44px] shadow-sm transition-all flex items-center justify-center gap-1">
                    🗺️ Calculate Dynamic Alternate Routes
                </button>
            </div>
        </div>

        <div class="px-4 py-2 flex justify-between items-center gap-2 border-t border-gray-100 bg-gray-50/50">
            <div class="flex items-center gap-2 flex-1 min-w-0">
                <div id="status-spinner" class="animate-spin rounded-full h-3.5 w-3.5 border-2 border-blue-600 border-t-transparent hidden"></div>
                <p id="status" class="text-xs font-bold text-gray-700 truncate">System ready. Enter parameters to map alternatives.</p>
            </div>
            <div class="flex items-center gap-1.5 shrink-0 overflow-x-auto no-scrollbar max-w-[70%] sm:max-w-none">
                <select id="buffer-select" class="bg-white text-gray-700 text-xs font-bold py-2 px-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 min-h-[44px]">
                    <option value="4000" selected>⏱️ 5 Min Buffer</option>
                    <option value="12000">⏱️ 15 Min Buffer</option>
                    <option value="24000">⏱️ 30 Min Buffer</option>
                </select>
                <button id="push-master-btn" class="bg-amber-500 hover:bg-amber-600 text-zinc-950 text-xs font-black px-3 py-2 rounded-xl min-h-[44px] shadow-sm active:scale-95 transition-all whitespace-nowrap">💾 Save Repo Favorites</button>
                <button id="toggle-search-btn" class="bg-white border border-gray-200 text-gray-700 text-xs font-bold px-3 py-2 rounded-xl min-h-[44px] whitespace-nowrap">🔍 Inputs</button>
                <button id="geo-btn" class="bg-blue-600 active:bg-blue-700 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px] whitespace-nowrap">🚗 Track</button>
            </div>
        </div>

        <div id="master-filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pt-2 pb-1.5 border-t border-gray-100">
            <button data-cat="playground" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🛝 Playgrounds</button>
            <button data-cat="gas" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">⛽ Gas Stations</button>
            <button data-cat="food" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🍔 Fast Food</button>
            <button data-cat="shopping" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🛒 Shopping & Services</button>
            <button data-cat="parks" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🌲 Parks & Attractions</button>
            <button data-cat="campground" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">⛺ Campgrounds</button>
            <button data-cat="medical" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🏥 Emergency & Med</button>
            <button data-cat="highway" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🏢 Highway Amenities</button>
            <button data-cat="tourism" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🌲 Tourism Exploration</button>
        </div>

        <div id="sub-filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pb-3 pt-1.5 border-t border-gray-100 bg-gray-50/70 hidden"></div>
    </div>

    <div id="navigation-hud" class="absolute top-52 left-4 z-30 bg-slate-900/95 backdrop-blur-md text-white border border-slate-700 p-3 rounded-xl shadow-xl w-64 hidden flex flex-col gap-3 transition-all duration-300 max-h-72 select-none">
        <div id="queue-hud-section" class="hidden flex flex-col gap-1.5 border-b border-slate-700/60 pb-2">
            <p class="text-[9px] font-black uppercase text-indigo-400 tracking-widest leading-none">📍 Stop Queue Order</p>
            <div id="queue-items-list" class="flex flex-col gap-1 max-h-24 overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <div id="next-stop-hud" class="absolute top-52 right-4 z-30 bg-slate-900/95 backdrop-blur-md text-white border border-slate-700 p-3 rounded-xl shadow-xl max-w-[200px] hidden pointer-events-none transition-all duration-300">
        <p class="text-[9px] font-black uppercase text-blue-400 tracking-widest leading-none mb-1">⏱️ Next Target Stop</p>
        <h4 id="hud-poi-name" class="text-xs font-black truncate text-white">---</h4>
        <p id="hud-poi-dist" class="text-sm font-black text-amber-400 mt-0.5">0.0 mi away</p>
    </div>

    <div class="absolute bottom-24 right-4 z-30 flex flex-col gap-2 items-center">
        <button id="theme-toggle-btn" class="bg-white/95 backdrop-blur-md border border-gray-200 text-zinc-900 font-bold rounded-xl shadow-xl text-xs px-2.5 h-11 flex items-center justify-center active:scale-95 transition-all select-none cursor-pointer whitespace-nowrap">🌙 Mode</button>
        <button id="zoom-in-btn" class="bg-white/95 backdrop-blur-md text-zinc-900 border border-gray-200 shadow-xl font-bold rounded-xl w-11 h-11 flex items-center justify-center active:scale-95 text-xl transition-all select-none cursor-pointer">＋</button>
        <button id="zoom-out-btn" class="bg-white/95 backdrop-blur-md text-zinc-900 border border-gray-200 shadow-xl font-bold rounded-xl w-11 h-11 flex items-center justify-center active:scale-95 text-xl transition-all select-none cursor-pointer">－</button>
        <button id="center-loc-btn" class="bg-white/95 backdrop-blur-md text-zinc-900 border border-gray-200 shadow-xl font-bold rounded-xl w-11 h-11 flex items-center justify-center active:scale-95 text-lg transition-all select-none cursor-pointer" title="Center Current Position">🎯</button>
    </div>

    <div id="route-mileage-sticky" class="absolute bottom-6 left-4 z-30 bg-slate-900/95 backdrop-blur-md text-white border border-slate-700 px-4 py-2.5 rounded-xl shadow-xl hidden font-black text-xs transition-all duration-300 pointer-events-auto">
        🏁 Route Remaining: <span id="sticky-total-dist" class="text-emerald-400 font-black">0.0</span> mi
    </div>

    <div id="map"></div>

    <div id="toast-container" class="absolute bottom-6 right-4 left-4 sm:left-auto z-50 flex flex-col gap-2 pointer-events-none max-w-sm safe-bottom"></div>

    <script>
        // =====================================================================
        // --- PHASE 1: RE-HOISTED GLOBAL VARIABLE & ALLOCATION POOLS ---------
        // =====================================================================
        const MAP_INITIAL_CENTER = [37.0902, -95.7129]; 
        const autocompleteQueryMemoryCache = new Map(); 
        let mathWorker = null; 
        let routingControl = null;
        
        let map = null;
        let mapLayersPool = {};
        let favoritesLayerGroup = null;
        let poiClusterGroup = null;

        // ALL SYSTEM STANDARD POOL VALUES AND SCOPES RE-HOISTED CORRECTLY BELOW
        let allPoiMarkersMemoryMap = [];
        let globalFavoritesMarkers = []; 
        let repoFavoritesMemory = [];    
        let localJsonMemory = null; 
        let routeLineCoordinates = [];
        let userMarker = null;
        let lastUserGpsCoord = null;
        let currentMasterCat = null;
        let currentSubFilter = 'none'; 
        let activeBufferMeters = 4000; 
        let mapStyleMode = 'light'; // <--- RESTORED POOL TERM LAYERS
        let activeTargetsSliceMemory = [];
        let routeBufferPolyline = null;
        let allowAutoCenter = true;
        let autoCenterTimeoutId = null;
        let isTracking = false;
        let watchId = null;
        let stopQueue = [];
        
        // Advanced Custom Multi-Route Management Subsystems
        let alternateRoutesGroupLayer = null; 
        let alternateCalloutsGroupLayer = null; 
        let rawRoutesMemoryArray = []; 
        let isAlternateMatrixModeActive = true; 
        
        // Dynamic Turn Machine Global Registry
        let activeInstructionIndex = 0;
        let currentRouteInstructions = [];
        let lastMileageUpdateGps = null;
        let wakeLock = null;
        let continuousOffRouteDriftTicks = 0; 

        // =====================================================================
        // --- PHASE 2: STATIC STANDARD BALANCED HOISTED UTILITIES -------------
        // =====================================================================
        function triggerToast(text, duration = 3000) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = "bg-gray-900/95 backdrop-blur-sm text-white text-xs font-semibold px-4 py-3 rounded-xl shadow-lg flex items-center transition-all duration-300 opacity-0 translate-y-2 pointer-events-auto";
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 50);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-1');
                setTimeout(() => { toast.remove(); }, 300);
            }, duration);
        }

        function updateInlineStatus(text, showSpinner = false) {
            const statusLabel = document.getElementById('status');
            if (statusLabel) statusLabel.innerText = text;
            const spinner = document.getElementById('status-spinner');
            if (spinner) {
                if (showSpinner) spinner.classList.remove('hidden');
                else spinner.classList.add('hidden');
            }
        }

        function buildCleanAddressString(addr, displayNameFallback) {
            if (!addr) return displayNameFallback.split(',').slice(0, 3).join(',');
            let tokens = [];
            const roadLine = addr.house_number && addr.road ? `${addr.house_number} ${addr.road}` : (addr.road || '');
            if (roadLine) tokens.push(roadLine);
            if (addr.city || addr.town || addr.village || addr.suburb) tokens.push(addr.city || addr.town || addr.village || addr.suburb);
            if (addr.state) tokens.push(addr.state);
            if (addr.postcode) tokens.push(addr.postcode);
            return tokens.length > 0 ? tokens.join(', ') : displayNameFallback.split(',').slice(0, 3).join(',');
        }

        function createCustomIcon(label, classes, isLarge = false) {
            const sizeClass = isLarge ? 'w-11 h-11 text-xl border-3' : 'w-8 h-8 text-sm border-2';
            const sizePx = isLarge ? 44 : 32;
            return L.divIcon({
                html: `<div class="flex items-center justify-center rounded-full shadow-md font-bold ${sizeClass} ${classes}">${label}</div>`,
                className: '', iconSize: [sizePx, sizePx], iconAnchor: [sizePx / 2, sizePx / 2], popupAnchor: [0, -sizePx / 4]
            });
        }

        function createStarredIcon(label, isLarge = false) {
            const wrapperSize = isLarge ? 'w-11 h-11 text-xl border-3' : 'w-8 h-8 text-sm border-2';
            const sizePx = isLarge ? 44 : 32;
            return L.divIcon({
                html: `<div class="flex items-center justify-center rounded-full bg-gradient-to-br from-amber-300 via-yellow-400 to-amber-500 border-amber-600 text-black shadow-md font-black relative ${wrapperSize}">${label}<span class="absolute -bottom-1 -right-1 text-[10px] drop-shadow-sm">⭐</span></div>`,
                className: '', iconSize: [sizePx, sizePx], iconAnchor: [sizePx / 2, sizePx / 2], popupAnchor: [0, -sizePx / 4]
            });
        }

        function createRouteMarkerIcon(label, classes) {
            return L.divIcon({
                html: `<div class="flex items-center justify-center rounded-full shadow-md font-bold w-8 h-8 text-sm border-2 ${classes}">${label}</div>`,
                className: '', iconSize: [32, 32], iconAnchor: [16, 16]
            });
        }

        function triggerAutoCenterDelay() {
            if (!isTracking) return;
            allowAutoCenter = false; 
            clearTimeout(autoCenterTimeoutId);
            autoCenterTimeoutId = setTimeout(() => { allowAutoCenter = true; }, 20000); 
        }

        function updateBufferVisualizerWeight() {
            if (!routeBufferPolyline || routeLineCoordinates.length === 0) return;
            const currentMapCenterLatitude = map.getCenter().lat;
            const currentZoomLevel = map.getZoom();
            const metersPerPixel = (40075016.686 * Math.cos(currentMapCenterLatitude * Math.PI / 180)) / Math.pow(2, currentZoomLevel + 8);
            const calculatedPixelWidthWidth = (activeBufferMeters / metersPerPixel) * 2;
            routeBufferPolyline.setStyle({ weight: Math.max(4, calculatedPixelWidthWidth) });
        }

        function roundCoords(num) { return Math.round(parseFloat(num) * 10000) / 10000; }

        function calculateIntersectedStates(routeCoords) {
            const matchedStates = new Set();
            const sampleRate = Math.max(1, Math.floor(routeCoords.length / 100));
            for (let i = 0; i < routeCoords.length; i += sampleRate) {
                const pt = routeCoords[i];
                for (const [stateName, bbox] of Object.entries(STATE_BOUNDS_LOOKUP)) {
                    if (pt.lat >= bbox.s && pt.lat <= bbox.n && pt.lng >= bbox.w && pt.lng <= bbox.e) {
                        matchedStates.add(stateName);
                    }
                }
            }
            return Array.from(matchedStates);
        }

        function dispatchOffThreadAnalysis() {
            if (!routeLineCoordinates || routeLineCoordinates.length === 0) return;
            const sliceRate = Math.max(8, Math.ceil(routeLineCoordinates.length / 52));
            activeTargetsSliceMemory = [];
            for(let i = 0; i < routeLineCoordinates.length; i += sliceRate) { activeTargetsSliceMemory.push(routeLineCoordinates[i]); }
            activeTargetsSliceMemory.push(routeLineCoordinates[routeLineCoordinates.length - 1]);

            if (mathWorker) {
                mathWorker.postMessage({
                    localElements: localJsonMemory, targetsSlice: activeTargetsSliceMemory, activeBufferMeters: activeBufferMeters,
                    currentMasterCat: currentMasterCat, currentSubFilter: currentSubFilter
                });
            }
        }

        function runDataExecutionLayer(masterCat) {
            if (!routeLineCoordinates || routeLineCoordinates.length === 0) { 
                return; 
            }
            dispatchOffThreadAnalysis();
        }

        function performInlineFieldLocate(inputId, clearBtnId) {
            if (!navigator.geolocation) {
                triggerToast("GPS Hardware is unavailable on this browser framework.");
                return;
            }
            updateInlineStatus("Querying satellite position coordinates...", true);
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const inputEl = document.getElementById(inputId);
                    inputEl.value = "Current Location";
                    inputEl.dataset.lat = pos.coords.latitude;
                    inputEl.dataset.lon = pos.coords.longitude;
                    document.getElementById(clearBtnId).classList.remove('hidden');
                    updateInlineStatus("Current coordinates successfully applied.");
                    triggerToast("Acquired hardware GPS coordinates successfully.");
                },
                (err) => {
                    updateInlineStatus("GPS connection request rejected.");
                    triggerToast("Telemetry failure: Verify browser positioning location permissions.");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }

        function computeTargetCenteringNode() {
            if (routeLineCoordinates.length > 0 && lastUserGpsCoord) {
                const routeBoundsCenter = L.polyline(routeLineCoordinates).getBounds().getCenter();
                return L.latLng((routeBoundsCenter.lat + lastUserGpsCoord[0]) / 2, (routeBoundsCenter.lng + lastUserGpsCoord[1]) / 2);
            } else if (routeLineCoordinates.length > 0) {
                return L.polyline(routeLineCoordinates).getBounds().getCenter();
            } else if (lastUserGpsCoord) {
                return L.latLng(lastUserGpsCoord[0], lastUserGpsCoord[1]);
            }
            return map.getCenter();
        }

        async function loadMasterRepoFavoritesOnBoot() {
            try {
                updateInlineStatus("Fetching dynamic favorites configuration from repository...", true);
                const response = await fetch('https://raw.githubusercontent.com/kev11wolf/public/main/favorites.json', { cache: 'no-store' });
                if (response.ok) {
                    repoFavoritesMemory = await response.json();
                    renderGlobalPermanentStars();
                    updateInlineStatus("Loaded live favorites from GitHub repository.");
                } else {
                    throw new Error("Repository path inaccessible");
                }
            } catch (err) {
                console.warn("GitHub fetch unavailable, reverting to local layout memory cache.", err);
                const cached = localStorage.getItem('repo_favorites_memory');
                repoFavoritesMemory = cached ? JSON.parse(cached) : [];
                renderGlobalPermanentStars();
                updateInlineStatus("Loaded local profile configuration fallbacks.");
            }
        }

        function launchAutomatedGitHubSyncPipeline() {
            const currentPinnedStars = localStorage.getItem('starred_pois') || '[]';
            let formattedDataPayload = "";
            try {
                formattedDataPayload = JSON.stringify(JSON.parse(currentPinnedStars), null, 4);
            } catch (e) {
                formattedDataPayload = currentPinnedStars;
            }

            navigator.clipboard.writeText(formattedDataPayload).then(() => {
                triggerToast("Favorites copied to clipboard! Opening GitHub staging area...", 4000);
                setTimeout(() => {
                    window.open("https://github.com/kev11wolf/public/edit/main/favorites.json", "_blank");
                }, 400);
                localStorage.setItem('repo_favorites_memory', currentPinnedStars);
            }).catch(err => {
                console.error("System clipboard write block detected: ", err);
                alert("Failed to write to clipboard automatically. Please manually export your profile stars.");
            });
        }

        function triggerRouteCalculation() {
            const startInput = document.getElementById('start-input');
            const endInput = document.getElementById('end-input');
            if (!startInput.dataset.lat || !endInput.dataset.lat) return;

            let finalWaypoints = [L.latLng(startInput.dataset.lat, startInput.dataset.lon)];
            stopQueue.forEach(stop => {
                finalWaypoints.push(L.latLng(stop.lat, stop.lon));
            });
            finalWaypoints.push(L.latLng(endInput.dataset.lat, endInput.dataset.lon));

            isAlternateMatrixModeActive = true; 
            routingControl.setWaypoints(finalWaypoints);
        }

        function updateQueueHUD() {
            const section = document.getElementById('queue-hud-section');
            const list = document.getElementById('queue-items-list');
            const navHud = document.getElementById('navigation-hud');
            if (!list || !section || !navHud) return;

            list.innerHTML = '';

        function findClosestPointOnLineSegment(p, p1, p2) {
            const x = p.lat, y = p.lng;
            const x1 = p1.lat, y1 = p1.lng;
            const x2 = p2.lat, y2 = p2.lng;
            const dx = x2 - x1, dy = y2 - y1;
            if (dx === 0 && dy === 0) return p1;
            let t = ((x - x1) * dx + (y - y1) * dy) / (dx * dx + dy * dy);
            t = Math.max(0, Math.min(1, t));
            return L.latLng(x1 + t * dx, y1 + t * dy);
        }

        function computeSnapToRouteVector(actualLatLng) {
            if (routeLineCoordinates.length === 0) return actualLatLng;
            let minimumObservedDistance = Infinity;
            let optimalSnappedLocation = actualLatLng;
            
            for (let i = 0; i < routeLineCoordinates.length - 1; i++) {
                const candidatePoint = findClosestPointOnLineSegment(actualLatLng, routeLineCoordinates[i], routeLineCoordinates[i + 1]);
                const evaluationDistance = map.distance(actualLatLng, candidatePoint);
                if (evaluationDistance < minimumObservedDistance) {
                    minimumObservedDistance = evaluationDistance;
                    optimalSnappedLocation = candidatePoint;
                }
            }
            return (minimumObservedDistance < 35) ? optimalSnappedLocation : actualLatLng;
        }

        function resolveDirectionalManeuverSymbol(text) {
            const raw = text.toLowerCase();
            if (raw.includes('left') && raw.includes('sharp')) return '⮌';
            if (raw.includes('right') && raw.includes('sharp')) return '⮎';
            if (raw.includes('left') && raw.includes('slight')) return '↖️';
            if (raw.includes('right') && raw.includes('slight')) return '↗️';
            if (raw.includes('left')) return '⬅️';
            if (raw.includes('right')) return '➡️';
            if (raw.includes('roundabout') || raw.includes('u-turn')) return '🔄';
            return '⬆️';
        }

        function updateAppleNavigationHUD(currentSnappedLatLng) {
            const banner = document.getElementById('apple-navigation-hud');
            if (currentRouteInstructions.length === 0 || routeLineCoordinates.length === 0 || isAlternateMatrixModeActive) {
                if (banner) banner.classList.add('-translate-y-48', 'hidden');
                return;
            }

            banner.classList.remove('hidden');
            setTimeout(() => banner.classList.remove('-translate-y-48'), 50);

            let minimumDistanceToRouteLine = Infinity;
            let currentClosestSegmentIndex = 0;
            for (let i = 0; i < routeLineCoordinates.length; i++) {
                const d = map.distance(currentSnappedLatLng, routeLineCoordinates[i]);
                if (d < minimumDistanceToRouteLine) {
                    minimumDistanceToRouteLine = d;
                    currentClosestSegmentIndex = i;
                }
            }

            let targetInstruction = null;
            let activeIdx = 0;
            for (let i = 0; i < currentRouteInstructions.length; i++) {
                if (currentRouteInstructions[i].index >= currentClosestSegmentIndex) {
                    targetInstruction = currentRouteInstructions[i];
                    activeIdx = i;
                    break;
                }
            }
            if (!targetInstruction) {
                targetInstruction = currentRouteInstructions[currentRouteInstructions.length - 1];
                activeIdx = currentRouteInstructions.length - 1;
            }

            activeInstructionIndex = activeIdx;

            const text = targetInstruction.text || "Continue on path";
            document.getElementById('hud-turn-instruction').innerText = text;
            document.getElementById('hud-turn-icon').innerText = resolveDirectionalManeuverSymbol(text);

            const nextStepObj = currentRouteInstructions[activeIdx + 1];
            document.getElementById('hud-next-step-preview').innerText = nextStepObj ? (nextStepObj.text || "Destination") : "Destination";

            const turnCoordinate = routeLineCoordinates[targetInstruction.index];
            if (turnCoordinate) {

        // =====================================================================
        // --- PHASE 4: HIGH-SPEED CORRIDOR BACKGROUND WEB WORKER ENGINE -------
        // =====================================================================
        const workerBlobCode = `
            function haversineDist(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
            }

            self.onmessage = function(e) {
                const { localElements, targetsSlice, activeBufferMeters, currentMasterCat, currentSubFilter } = e.data;
                const finalMatches = [];
                if (!localElements) {
                    self.postMessage({ sortedMatches: [] });
                    return;
                }

                let minTlat = 90, maxTlat = -90, minTlon = 180, maxTlon = -180;
                for(let j=0; j<targetsSlice.length; j++) {
                    if (targetsSlice[j].lat < minTlat) minTlat = targetsSlice[j].lat;
                    if (targetsSlice[j].lat > maxTlat) maxTlat = targetsSlice[j].lat;
                    if (targetsSlice[j].lng < minTlon) minTlon = targetsSlice[j].lng;
                    if (targetsSlice[j].lng > maxTlon) maxTlon = targetsSlice[j].lng;
                }
                const degPad = (activeBufferMeters + 3000) / 111000;
                const spatialEnvelope = { n: maxTlat + degPad, s: minTlat - degPad, e: maxTlon + degPad, w: minTlon - degPad };

                localElements.forEach(el => {
                    if (el.c !== currentMasterCat) return;
                    if (el.lat > spatialEnvelope.n || el.lat < spatialEnvelope.s || el.lon > spatialEnvelope.e || el.lon < spatialEnvelope.w) return;
                    
                    let isMatch = false;
                    let normBrand = el.b || '';

                    if (currentSubFilter === 'none') {
                        isMatch = true; 
                    } else {
                        if (currentSubFilter === 'unl87' && el.g87 === 1) isMatch = true;
                        else if (currentSubFilter === 'unl88' && el.g88 === 1) isMatch = true;
                        else if (normBrand === currentSubFilter) isMatch = true;
                        else if (el.c === currentSubFilter) isMatch = true;
                    }
                    
                    if (!isMatch) return;

                    let minD = Infinity;
                    for (let j = 0; j < targetsSlice.length; j++) {
                        const d = haversineDist(el.lat, el.lon, targetsSlice[j].lat, targetsSlice[j].lng);
                        if (d < minD) minD = d;
                    }

                    if (minD <= activeBufferMeters) {
                        finalMatches.push({
                            lat: el.lat, lon: el.lon, n: el.n, brand: normBrand, category: el.c, hours: el.h || "Hours not listed", desc: el.d || "", minD: minD, g87: el.g87, g88: el.g88
                        });
                    }
                });
                self.postMessage({ sortedMatches: finalMatches.sort((a, b) => a.minD - b.minD) });
            };
        `;
        const blobObj = new Blob([workerBlobCode], { type: 'application/javascript' });
        mathWorker = new Worker(URL.createObjectURL(blobObj));

            }
            updateInlineStatus(`Corridor calculations ready: [Mapped ${sortedMatches.length} Facilities]`);
        };

        routingControl = L.Routing.control({

            let isStarredCurrently = starredList.some(item => roundCoords(item.lat) === roundCoords(lat) && roundCoords(item.lon) === roundCoords(lon));
            let starBtnText = isStarredCurrently ? "❌ Remove Local Star" : "⭐ Persistently Star";
            let starBtnColor = isStarredCurrently ? "bg-zinc-600 hover:bg-zinc-700" : "bg-amber-600 hover:bg-amber-700";

            const extraDetourMiles = (el.minD * 0.000621371).toFixed(2);
            let mileagePredictorBadgeHtml = `<div class="text-[10px] text-blue-600 font-bold tracking-tight my-1">🚗 Detour: +${extraDetourMiles} mi off route corridor</div>`;

            let stopQueueBtnHtml = `<button class="queue-stop-trigger block w-full text-center bg-indigo-600 hover:bg-indigo-700 text-[10px] py-1.5 rounded-xl border border-indigo-800 shadow-sm text-white font-black cursor-pointer active:scale-95 transition-transform" data-lat="${lat}" data-lon="${lon}" data-name="${popupHeadingName.replace(/"/g, '"')}">📍 Set Stop</button>`;

            const popupContent = `
                <div class="w-full font-sans p-0.5 text-zinc-955">
                    <img src="${uiConfig.img}" class="w-full h-16 object-cover rounded-lg mb-1.5 shadow-sm" onerror="this.style.display='none'">
                    <h3 class="text-xs font-black text-black leading-tight truncate">${popupHeadingName}</h3>
                    <div class="text-[11px] text-zinc-800 font-medium leading-tight my-1">${popupDesc}</div>
                    ${mileagePredictorBadgeHtml}
                    ${fuelBadgeHtml}
                    <div class="border-t border-zinc-200 pt-1 mt-1">
                        <span class="text-[9px] uppercase font-black text-zinc-500 block tracking-wider">Hours</span>
                        <p class="text-xs text-zinc-900 italic font-bold truncate leading-none mt-0.5">${popupHours}</p>
                    </div>
                    <div class="mt-2.5 flex flex-col gap-1 text-white font-black drop-shadow-sm">
                        <button class="star-toggle-trigger block w-full text-center ${starBtnColor} text-[10px] py-1.5 rounded-xl border border-black/10 shadow-sm text-white font-black cursor-pointer active:scale-95 transition-transform" data-lat="${lat}" data-lon="${lon}" data-name="${popupHeadingName.replace(/"/g, '"')}" data-cat="${el.category}" data-brand="${el.brand}" data-hours="${popupHours}" data-desc="${popupDesc}">${starBtnText}</button>
                        ${stopQueueBtnHtml}
                        <a href="${googleMapsUniversalDeepLinkUrl}" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-[10px] py-1.5 rounded-xl border border-blue-800 shadow-sm text-white font-black flex items-center justify-center">🗺️ View on Google Maps</a>
                        <a href="${robustGoogleReviewSearchUrl}" target="_blank" class="block w-full text-center bg-emerald-700 hover:bg-emerald-800 text-[10px] py-1.5 rounded-xl border border-emerald-900 shadow-sm text-white font-black flex items-center justify-center">🌐 Search Reviews & Info</a>
                        <a href="${appleMapsUrl}" target="_blank" class="block w-full text-center bg-zinc-800 hover:bg-zinc-900 text-[10px] py-1.5 rounded-xl border border-zinc-950 shadow-sm text-white font-black flex items-center justify-center">🍎 Route in Apple Maps</a>
                    </div>
                </div>
            `;

            const finalIconChoice = (forceStarredStyleProfile || isStarredCurrently) 
                ? createStarredIcon(uiConfig.label, isLarge)
                : createCustomIcon(uiConfig.label, uiConfig.bg, isLarge);

            const marker = L.marker([lat, lon], { icon: finalIconChoice })
                .bindPopup(popupContent, { 
                    className: 'custom-popup', autoPan: true,
                    autoPanPaddingTopLeft: L.point(15, 230), autoPanPaddingBottomRight: L.point(15, 25), maxWidth: 210
                });

            allPoiMarkersMemoryMap.push({ marker: marker, visualKey: visualCatKey });
            poiClusterGroup.addLayer(marker);
        }

        // =====================================================================
        // --- PHASE 6: NOMINATIM GEOLOCATION AUTOCOMPLETE ENGINE -----------
        // =====================================================================
        function runCachedAutocompleteSearch(inputElement, dropdownElement) {
            const query = inputElement.value.trim();
            const clearBtn = document.getElementById(inputElement.id === 'start-input' ? 'start-clear-btn' : 'end-clear-btn');
            
            if (query.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');

            if (query.length < 3) {
                dropdownElement.innerHTML = ''; dropdownElement.classList.add('hidden'); return;
            }

            if (autocompleteQueryMemoryCache.has(query)) {
                renderAutocompleteDropdownDOM(autocompleteQueryMemoryCache.get(query), inputElement, dropdownElement); return;
            }

            fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=6&addressdetails=1&countrycodes=us&q=${encodeURIComponent(query)}`)
            .then(res => { if (!res.ok) throw new Error(); return res.json(); })
            .then(data => {
                autocompleteQueryMemoryCache.set(query, data);
                renderAutocompleteDropdownDOM(data, inputElement, dropdownElement);
            }).catch(() => {});
        }

        function renderAutocompleteDropdownDOM(data, inputElement, dropdownElement) {
            dropdownElement.innerHTML = '';
            if (!data || data.length === 0) {
                const noResult = document.createElement('div');
                noResult.className = "px-3 py-2.5 bg-gray-50 text-gray-500 italic text-xs select-none rounded-xl";
                noResult.innerText = "No locations found in the US";
                dropdownElement.appendChild(noResult); dropdownElement.classList.remove('hidden'); return;
            }
            dropdownElement.classList.remove('hidden');

            data.forEach(item => {
                const cleanOutputString = buildCleanAddressString(item.address, item.display_name);
                const option = document.createElement('div');
                option.className = "px-3 py-2.5 bg-white hover:bg-blue-50 border-b border-gray-100 last:border-0 cursor-pointer truncate text-zinc-900 font-semibold text-xs transition-colors";
                option.innerText = cleanOutputString;

                option.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    inputElement.value = cleanOutputString;
                    inputElement.dataset.lat = item.lat;
                    inputElement.dataset.lon = item.lon;
                    dropdownElement.innerHTML = ''; dropdownElement.classList.add('hidden');
                    document.getElementById(inputElement.id === 'start-input' ? 'start-clear-btn' : 'end-clear-btn').classList.remove('hidden');
                });
                dropdownElement.appendChild(option);
            });
        }

        // =====================================================================
        // --- PHASE 7: HUD DRAWER MENU COMPILER FILTERS LAYER -----------------
        // =====================================================================
        function handleMasterCategorySelection(element) {
            document.querySelectorAll('.master-pill').forEach(btn => btn.className = "master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]");
            element.className = "master-pill bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm whitespace-nowrap min-h-[44px]";
            currentMasterCat = element.getAttribute('data-cat'); currentSubFilter = 'none';
            poiClusterGroup.clearLayers(); allPoiMarkersMemoryMap = [];
            const hud = document.getElementById('next-stop-hud'); if (hud) hud.classList.add('hidden');
            generateSubMenuUI(currentMasterCat); runDataExecutionLayer(currentMasterCat);
        }

        // =====================================================================
        // --- PHASE 8: REFINED CORE INTERACTION EVENT REGISTRIES -------------
        // =====================================================================
        function generateSubMenuUI(catId) {
            const subBar = document.getElementById('sub-filter-bar'); subBar.innerHTML = '';
            const definition = subMenuDefinitions[catId]; if (!definition) { subBar.classList.add('hidden'); return; }
            definition.forEach((sub) => {
                const subButton = document.createElement('button'); subButton.setAttribute('data-sub', sub.id);
                subButton.className = "sub-pill bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px] cursor-pointer shadow-sm text-zinc-700 transition-colors hover:bg-gray-50";
                subButton.innerText = sub.label; subBar.appendChild(subButton);
            });
            subBar.classList.remove('hidden');
        }

        document.getElementById('master-filter-bar').addEventListener('click', (e) => { const pill = e.target.closest('.master-pill'); if (pill) handleMasterCategorySelection(pill); });
        
        document.getElementById('sub-filter-bar').addEventListener('click', (e) => {
            const subPill = e.target.closest('.sub-pill'); if (!subPill) return;
            document.querySelectorAll('.sub-pill').forEach(btn => btn.className = "sub-pill bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px] transition-colors hover:bg-gray-50 text-zinc-700");
            subPill.className = "sub-pill bg-gray-900 text-white text-xs font-bold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]";
            currentSubFilter = subPill.getAttribute('data-sub'); dispatchOffThreadAnalysis();
        });

        document.getElementById('buffer-select').addEventListener('change', (e) => { 
            activeBufferMeters = parseInt(e.target.value); updateBufferVisualizerWeight();
            if (localJsonMemory) dispatchOffThreadAnalysis(); 
        });
        
        document.getElementById('toggle-search-btn').addEventListener('click', () => { const s = document.getElementById('search-container'); if (s) s.classList.toggle('hidden'); });
        document.getElementById('push-master-btn').addEventListener('click', launchAutomatedGitHubSyncPipeline);

        document.getElementById('swap-locations-btn').addEventListener('click', () => {
            const startIn = document.getElementById('start-input');
            const endIn = document.getElementById('end-input');
            const startClear = document.getElementById('start-clear-btn');
            const endClear = document.getElementById('end-clear-btn');

            const tmpText = startIn.value;
            const tmpLat = startIn.dataset.lat;
            const tmpLon = startIn.dataset.lon;

            startIn.value = endIn.value;
            startIn.dataset.lat = endIn.dataset.lat || '';
            startIn.dataset.lon = endIn.dataset.lon || '';

            endIn.value = tmpText;
            endIn.dataset.lat = tmpLat || '';
            endIn.dataset.lon = tmpLon || '';

            if (!startIn.dataset.lat || startIn.dataset.lat === '') {
                delete startIn.dataset.lat; delete startIn.dataset.lon; startClear.classList.add('hidden');
            } else {
                startClear.classList.remove('hidden');
            }

            if (!endIn.dataset.lat || endIn.dataset.lat === '') {
                delete endIn.dataset.lat; delete endIn.dataset.lon; endClear.classList.add('hidden');
            } else {
                endClear.classList.remove('hidden');
            }
            triggerToast("Swapped start and destination fields.");
        });

        document.getElementById('start-clear-btn').addEventListener('click', () => {
            const startIn = document.getElementById('start-input');
            startIn.value = '';
            delete startIn.dataset.lat;
            delete startIn.dataset.lon;
            document.getElementById('start-clear-btn').classList.add('hidden');
        });

        document.getElementById('end-clear-btn').addEventListener('click', () => {
            const endIn = document.getElementById('end-input');
            endIn.value = '';
            delete endIn.dataset.lat;
            delete endIn.dataset.lon;
            document.getElementById('end-clear-btn').classList.add('hidden');
        });

        document.getElementById('start-locate-btn').addEventListener('click', () => performInlineFieldLocate('start-input', 'start-clear-btn'));
        document.getElementById('end-locate-btn').addEventListener('click', () => performInlineFieldLocate('end-input', 'end-clear-btn'));

        document.getElementById('route-btn').addEventListener('click', async () => {
            const startInput = document.getElementById('start-input'); const endInput = document.getElementById('end-input');
            if (!startInput.dataset.lat || !endInput.dataset.lat) { alert("Select suggested autocomplete options first."); return; }
            triggerRouteCalculation();
        });

        routingControl.on('routingerror', function(e) {
            console.error("OSRM Connection Error Blocked: ", e);
            updateInlineStatus("OSRM Server Timeout. Re-calculating path corridor parameters...", false);
            triggerToast("Routing server connection dropped. Automatically retrying calculation...");
        });

        document.getElementById('theme-toggle-btn').addEventListener('click', (e) => {
            map.removeLayer(mapLayersPool[mapStyleMode]);
            mapStyleMode = mapStyleMode === 'light' ? 'dark' : 'light';
            mapLayersPool[mapStyleMode].addTo(map);
            e.target.innerText = mapStyleMode === 'light' ? "🌙 Mode" : "☀️ Mode";
            triggerToast(`Map skin changed to ${mapStyleMode} mode layouts.`);
        });

        document.getElementById('zoom-in-btn').addEventListener('click', () => { map.setView(computeTargetCenteringNode(), map.getZoom() + 1); });
        document.getElementById('zoom-out-btn').addEventListener('click', () => { map.setView(computeTargetCenteringNode(), map.getZoom() - 1); });

        document.getElementById('center-loc-btn').addEventListener('click', () => {
            if (lastUserGpsCoord) {
                map.setView(lastUserGpsCoord, Math.max(map.getZoom(), 15));
                triggerToast("Centered map onto asset tracking telemetry position.");
            } else {
                if (!navigator.geolocation) {
                    triggerToast("GPS Hardware is unavailable.");
                    return;
                }
                updateInlineStatus("Resolving standalone sensor positioning...", true);
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        lastUserGpsCoord = [pos.coords.latitude, pos.coords.longitude];
                        if (!userMarker) { 
                            userMarker = L.marker(lastUserGpsCoord, { icon: createCustomIcon('🚗', 'bg-blue-500 border-white text-white', false) }).addTo(map); 
                        } else { 
                            userMarker.setLatLng(lastUserGpsCoord); 
                        }
                        map.setView(lastUserGpsCoord, 15);
                        updateInlineStatus("System realigned.");
                        triggerToast("Position aligned successfully.");
                    },
                    () => {
                        updateInlineStatus("Positioning failure.");
                        triggerToast("Telemetry context access timed out.");
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            }
        });

        routingControl.on('routesfound', async function(e) {
            rawRoutesMemoryArray = e.routes || []; 
            routeLineCoordinates = e.routes[0].coordinates;
            currentRouteInstructions = e.routes[0].instructions || [];
            activeInstructionIndex = 0;
            lastMileageUpdateGps = null;
            continuousOffRouteDriftTicks = 0; 

            const searchContainer = document.getElementById('search-container');
            if (searchContainer) searchContainer.classList.add('hidden');
            
            if (isAlternateMatrixModeActive) {
                document.getElementById('route-mileage-sticky').classList.add('hidden');
                renderAlternateRoutePathsMatrix(rawRoutesMemoryArray);
                updateInlineStatus("Alternate choices plotted. Select an option to engage navigation.");
            } else {
                selectAndLockPrimaryTrackPath(0);
            }

            poiClusterGroup.clearLayers();
            allPoiMarkersMemoryMap = [];
            
            const activeCrossedStates = calculateIntersectedStates(routeLineCoordinates);
            updateInlineStatus(`Crossed state borders mapped: [${activeCrossedStates.length} States identified]`, true);
            
            localJsonMemory = [];
            
            await Promise.all(activeCrossedStates.map(async (stateName) => {
                try {
                    const response = await fetch(`data/${stateName}_brands.json`);
                    if (response.ok) {
                        const stateData = await response.json();
                        localJsonMemory = localJsonMemory.concat(stateData);
                    } else {
                        const generatedMocks = await requestAlternateStateJsonShardFallback(stateName);
                        localJsonMemory = localJsonMemory.concat(generatedMocks);
                    }
                } catch(err) {
                    console.warn(`Shard loop pass error for state variable: ${stateName}`, err);
                }
            }));

            if (localJsonMemory.length === 0) {
                const generatedMocks = await requestAlternateStateJsonShardFallback("national");
                localJsonMemory = localJsonMemory.concat(generatedMocks);
            }

            renderGlobalPermanentStars(); 
            if (currentMasterCat) runDataExecutionLayer(currentMasterCat);
        });

        map.on('popupopen', function(e) {
            const containerNode = e.popup.getElement();

            const queueBtn = containerNode.querySelector('.queue-stop-trigger');
            if (queueBtn) {
                queueBtn.addEventListener('click', function() {
                    const lat = parseFloat(this.dataset.lat);
                    const lon = parseFloat(this.dataset.lon);
                    const name = this.dataset.name;

                    if (!stopQueue.some(s => roundCoords(s.lat) === roundCoords(lat) && roundCoords(s.lon) === roundCoords(lon))) {
                        stopQueue.push({ lat, lon, name });
                        triggerToast(`Added stop: "${name}"`);
                        updateQueueHUD();
                        triggerRouteCalculation();
                    } else {
                        triggerToast("This location is already inside your target stop queue.");
                    }
                    map.closePopup();
                });
            }

            const starToggle = containerNode.querySelector('.star-toggle-trigger');
            if (starToggle) {
                starToggle.addEventListener('click', function() {
                    const lat = parseFloat(this.dataset.lat);
                    const lon = parseFloat(this.dataset.lon);
                    let localStarred = JSON.parse(localStorage.getItem('starred_pois') || '[]');
                    const matchIndex = localStarred.findIndex(item => roundCoords(item.lat) === roundCoords(lat) && roundCoords(item.lon) === roundCoords(lon));
                    
                    if (matchIndex > -1) {
                        localStarred.splice(matchIndex, 1);
                        triggerToast("Removed from profile stars.");
                    } else {
                        localStarred.push({
                            lat: lat, lon: lon,
                            name: this.dataset.name,
                            category: this.dataset.cat,
                            brand: this.dataset.brand,
                            hours: this.dataset.hours,
                            desc: this.dataset.desc
                        });
                        triggerToast("Location pinned persistently to profile map layer!");
                    }
                    localStorage.setItem('starred_pois', JSON.stringify(localStarred));
                    renderGlobalPermanentStars();
                    map.closePopup();
                });
            }

            const repoDelete = containerNode.querySelector('.global-delete-trigger');
            if (repoDelete) {
                repoDelete.addEventListener('click', function() {
                    const lat = parseFloat(this.dataset.lat);
                    const lon = parseFloat(this.dataset.lon);
                    repoFavoritesMemory = repoFavoritesMemory.filter(r => !(roundCoords(r.lat) === roundCoords(lat) && roundCoords(r.lon) === roundCoords(lon)));
                    
                    let localStarred = JSON.parse(localStorage.getItem('starred_pois') || '[]');
                    localStarred = localStarred.filter(item => !(roundCoords(item.lat) === roundCoords(lat) && roundCoords(item.lon) === roundCoords(lon)));
                    localStorage.setItem('starred_pois', JSON.stringify(localStarred));
                    
                    triggerToast("Dropped location item from repository matrix.");
                    renderGlobalPermanentStars();
                    map.closePopup();
                });
            }
        });

        // =====================================================================
        // --- PHASE 9: GEOLOCATION HARDWARE WATCH TELEMETRY ENGINE -----------
        // =====================================================================
        const geoBtn = document.getElementById('geo-btn');
        geoBtn.addEventListener('click', () => {
            if (isTracking) { 
                if (watchId) navigator.geolocation.clearWatch(watchId); 
                releaseScreenWakeLockBlock();
                isTracking = false; allowAutoCenter = true; clearTimeout(autoCenterTimeoutId);
                geoBtn.innerText = "🚗 Track"; geoBtn.className = "bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]"; 
                const banner = document.getElementById('apple-navigation-hud');
                if (banner) banner.classList.add('-translate-y-48', 'hidden');
            } else {
                if (!navigator.geolocation) { alert("GPS hardware unavailable."); return; }
                requestScreenWakeLockBlock();
                geoBtn.innerText = "🛑 Stop"; geoBtn.className = "bg-red-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]"; isTracking = true;
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    
                    const startInField = document.getElementById('start-input');
                    startInField.value = "Current Location";
                    startInField.dataset.lat = latitude;
                    startInField.dataset.lon = longitude;
                    document.getElementById('start-clear-btn').classList.remove('hidden');

                    if (lastUserGpsCoord) {
                        const distanceMoved = map.distance([latitude, longitude], lastUserGpsCoord); if (distanceMoved < 6) return; 
                    }
                    
                    const currentLatLngRaw = L.latLng(latitude, longitude);
                    lastUserGpsCoord = [latitude, longitude];

                    const snappedPoint = computeSnapToRouteVector(currentLatLngRaw);
                    
                    if (!userMarker) { 
                        userMarker = L.marker(snappedPoint, { icon: createCustomIcon('🚗', 'bg-blue-500 border-white text-white', false) }).addTo(map); 
                    } else { 
                        userMarker.setLatLng(snappedPoint); 
                    }
                    if (allowAutoCenter) map.panTo(snappedPoint);

                    if (stopQueue.length > 0) {
                        const distToActiveStop = map.distance(snappedPoint, L.latLng(stopQueue[0].lat, stopQueue[0].lon));
                        if (distToActiveStop < 45) { 
                            triggerToast(`Arrived at stop: "${stopQueue[0].name}"`);
                            stopQueue.shift();
                            updateQueueHUD();
                            triggerRouteCalculation();
                            return; 
                        }
                    }

                    if (routeLineCoordinates.length > 0 && !isAlternateMatrixModeActive) {
                        updateAppleNavigationHUD(snappedPoint);

                        let absoluteDistanceToRouteLine = Infinity;
                        for (let i = 0; i < routeLineCoordinates.length; i++) {
                            const d = map.distance(currentLatLngRaw, routeLineCoordinates[i]);
                            if (d < absoluteDistanceToRouteLine) absoluteDistanceToRouteLine = d;
                        }

                        if (absoluteDistanceToRouteLine > 75) { 
                            continuousOffRouteDriftTicks++;
                            if (continuousOffRouteDriftTicks >= 3) { 
                                triggerToast("Off-route deviation confirmed. Recalculating path corridor...", 4000);
                                triggerRouteCalculation();
                                continuousOffRouteDriftTicks = 0;
                            }
                        } else {
                            continuousOffRouteDriftTicks = 0; 
                        }

                        if (!lastMileageUpdateGps || map.distance(snappedPoint, lastMileageUpdateGps) >= 400) {
                            let remainingDistanceMeters = 0;
                            for (let i = activeInstructionIndex; i < routeLineCoordinates.length - 1; i++) {
                                remainingDistanceMeters += map.distance(routeLineCoordinates[i], routeLineCoordinates[i+1]);
                            }
                            const remainingDistanceMiles = (remainingDistanceMeters * 0.000621371).toFixed(1);
                            const stickyLabelValue = document.getElementById('sticky-total-dist');
                            if (stickyLabelValue) stickyLabelValue.innerText = remainingDistanceMiles;
                            
                            lastMileageUpdateGps = snappedPoint;
                        }
                    }
                }, () => { isTracking = false; }, { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 });
            }
        });

        // =====================================================================
        // --- PHASE 10: AUTOMATED BACKGROUND INTEGRATION LIFECYCLES -----------
        // =====================================================================
        async function requestScreenWakeLockBlock() {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.warn("System baseline power management blocks Wake Lock API: ", err);
            }
        }

        function releaseScreenWakeLockBlock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            ['start-input', 'end-input'].forEach(id => {
                const el = document.getElementById(id); let debounceTimer;
                el.addEventListener('input', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        runCachedAutocompleteSearch(el, document.getElementById(id === 'start-input' ? 'start-autocomplete' : 'end-autocomplete'));
                    }, 400);
                });
                el.addEventListener('blur', () => {
                    setTimeout(() => {
                        document.getElementById(id === 'start-input' ? 'start-autocomplete' : 'end-autocomplete').classList.add('hidden');
                    }, 200);
                });
            });

            loadMasterRepoFavoritesOnBoot();

            const interactiveControlBars = ['master-header-panel', 'navigation-hud', 'center-loc-btn', 'apple-navigation-hud'];
            interactiveControlBars.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    L.DomEvent.on(element, 'touchstart touchmove touchend mousedown dblclick contextmenu', L.DomEvent.stopPropagation);
                    L.DomEvent.disableClickPropagation(element); L.DomEvent.disableScrollPropagation(element);
                }
            });

            map.on('movestart zoomstart dragstart', triggerAutoCenterDelay);
            map.on('zoomend moveend', updateBufferVisualizerWeight);
        });
    </script>
</body>
</html>
