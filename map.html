<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NC Route Planner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111827;
        }
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Force-remove text directions itinerary layout panels completely */
        .leaflet-routing-container, .leaflet-routing-error, .leaflet-right {
            display: none !important;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 16px;
            padding: 6px;
        }
    </style>
</head>
<body class="flex flex-col justify-end">

    <div class="absolute top-0 left-0 right-0 z-10 bg-white/95 backdrop-blur-md border-b border-gray-200 safe-top shadow-md flex flex-col">
        <div class="px-4 py-3 flex justify-between items-center gap-2">
            <div class="flex-1 min-w-0">
                <h1 class="text-xs font-bold uppercase tracking-wider text-gray-400 truncate">Raleigh → Asheville</h1>
                <p id="status" class="text-sm font-semibold text-gray-800 truncate">Plotting highway path...</p>
            </div>
            <div class="flex items-center gap-1.5 shrink-0">
                <select id="buffer-select" class="bg-gray-100 active:bg-gray-200 text-gray-700 text-xs font-bold py-2 px-2.5 rounded-xl border-0 focus:ring-2 focus:ring-blue-500 min-h-[44px]">
                    <option value="4000">⏱️ 5 Min Max</option>
                    <option value="12000" selected>⏱️ 15 Min Max</option>
                    <option value="24000">⏱️ 30 Min Max</option>
                </select>
                <button id="clear-cache-btn" class="bg-gray-100 active:bg-gray-200 text-gray-600 text-xs font-medium px-2.5 py-2 rounded-xl hidden min-h-[44px]">
                    🔄 Reset
                </button>
                <button id="geo-btn" class="bg-blue-600 active:bg-blue-700 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm transition-all min-h-[44px]">
                    📍 Track
                </button>
            </div>
        </div>

        <div id="filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pb-3 pt-0.5">
            <button data-filter="all" class="filter-pill bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm whitespace-nowrap min-h-[44px]">All Stops</button>
            <button data-filter="playground" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🛝 Playgrounds</button>
            <button data-filter="sheetz" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">⛽ Sheetz</button>
            <button data-filter="mcdonalds" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🍟 McDonald's</button>
            <button data-filter="chickfila" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🐔 Chick-fil-A</button>
            <button data-filter="chipotle" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🌯 Chipotle</button>
            <button data-filter="wendys" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🍔 Wendy's</button>
            <button data-filter="jerseymikes" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🥪 Jersey Mike's</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="poi-loader" class="absolute bottom-6 left-4 right-4 z-10 bg-white/95 backdrop-blur-md rounded-xl p-4 shadow-xl border border-gray-100 safe-bottom hidden">
        <div class="flex items-center gap-3">
            <div class="animate-spin rounded-full h-5 w-5 border-2 border-blue-600 border-t-transparent"></div>
            <p id="loader-text" class="text-xs font-semibold text-gray-600">Scanning geographical corridor data...</p>
        </div>
    </div>

    <script>
        const START_COORDS = [35.601832, -78.623624]; // 620 Trunecek Cir
        const END_COORDS = [35.5951, -82.5515];     // Asheville
        const CACHE_KEY = 'nc_corridor_pois_v7';
        const CACHE_EXPIRY_MS = 7 * 24 * 60 * 60 * 1000;

        const NC_BOUNDS = L.latLngBounds([33.7, -84.4], [36.7, -75.3]);

        const FALLBACK_POI_DATABASE = [
            { lat: 36.0612, lon: -80.2981, tags: { name: "Sheetz #412", brand: "Sheetz", opening_hours: "24/7", description: "Convenience store chain offering gas & snacks." } },
            { lat: 36.0784, lon: -79.8012, tags: { name: "Chick-fil-A Greensboro", brand: "Chick-fil-A", opening_hours: "06:00-22:00 (Closed Sun)", description: "Classic chicken sandwiches and waffle fries." } },
            { lat: 35.7281, lon: -81.3324, tags: { name: "McDonald's Hickory", brand: "McDonald's", opening_hours: "05:00-23:00", description: "Standard fast-food burger staple." } },
            { lat: 36.0821, lon: -80.2415, tags: { name: "Hanes Park Playground", leisure: "playground", description: "Public city playground featuring swing sets and jungle gyms." } },
            { lat: 35.6120, lon: -82.2845, tags: { name: "Chipotle Mexican Grill", brand: "Chipotle", opening_hours: "10:45-22:00", description: "Build-your-own burritos, tacos, and bowls." } },
            { lat: 35.7921, lon: -78.7812, tags: { name: "Wendy's Cary", brand: "Wendy's", opening_hours: "10:00-01:00", description: "Square-patty burgers and classic Frosty desserts." } },
            { lat: 36.0345, lon: -80.3421, tags: { name: "Jersey Mike's Subs", brand: "Jersey Mike's", opening_hours: "10:00-21:00", description: "New Jersey-style counter-serve sub sandwiches." } },
            { lat: 35.6042, lon: -82.4215, tags: { name: "Robert Lake Park Playground", leisure: "playground", description: "Community recreation zone with slides and picnic areas." } }
        ];

        const poiConfigs = {
            playground: { label: '🛝', bg: 'bg-emerald-600 border-emerald-200 text-white', name: 'Public Playground', img: 'https://images.unsplash.com/photo-1596464716127-f2a82984de30?auto=format&fit=crop&w=300&q=80' },
            sheetz: { label: '⛽', bg: 'bg-red-600 border-red-200 text-white', name: 'Sheetz', img: 'https://images.unsplash.com/photo-1527018601619-a508a2be00cd?auto=format&fit=crop&w=300&q=80' },
            chipotle: { label: '🌯', bg: 'bg-amber-950 border-amber-600 text-white', name: 'Chipotle', img: 'https://images.unsplash.com/photo-1562059390-a761a084768e?auto=format&fit=crop&w=300&q=80' },
            jerseymikes: { label: '🥪', bg: 'bg-blue-900 border-amber-400 text-amber-400 font-bold', name: "Jersey Mike's", img: 'https://images.unsplash.com/photo-1509722747041-616f39b57569?auto=format&fit=crop&w=300&q=80' },
            mcdonalds: { label: '🍟', bg: 'bg-yellow-500 border-red-600 text-red-700 font-black', name: "McDonald's", img: 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=300&q=80' },
            wendys: { label: '🍔', bg: 'bg-sky-500 border-sky-200 text-white', name: "Wendy's", img: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=300&q=80' },
            chickfila: { label: '🐔', bg: 'bg-red-700 border-white text-white', name: 'Chick-fil-A', img: 'https://images.unsplash.com/photo-1610614819513-58e34989848b?auto=format&fit=crop&w=300&q=80' },
            food: { label: '🍴', bg: 'bg-zinc-500 border-zinc-300 text-white', name: 'Food Stop', img: 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=300&q=80' }
        };

        let allPoiMarkers = [];
        let rawPoiDataMemory = []; // Permanent database layer in-memory cache
        let routeLineCoordinates = [];
        let userMarker = null;
        let activeFilter = 'all';
        let activeBufferMeters = 12000; // Default matching radius (15-minute straight line equivalent)

        const map = L.map('map', { 
            zoomControl: false, 
            tap: true,
            maxBounds: NC_BOUNDS,
            maxBoundsViscosity: 1.0,
            minZoom: 7
        }).setView([35.75, -80.5], 8);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const createCustomIcon = (label, classes) => L.divIcon({
            html: `<div class="flex items-center justify-center w-8 h-8 rounded-full border-2 shadow-md text-sm ${classes}">${label}</div>`,
            className: '',
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -10]
        });

        const routingControl = L.Routing.control({
            waypoints: [L.latLng(START_COORDS[0], START_COORDS[1]), L.latLng(END_COORDS[0], END_COORDS[1])],
            show: false,
            addWaypoints: false,
            draggableWaypoints: false,
            createMarker: (i, wp) => L.marker(wp.latLng, { icon: createCustomIcon(i === 0 ? '🏁' : '⛰️', 'bg-black border-white text-white font-bold') })
        }).addTo(map);

        routingControl.on('routesfound', function(e) {
            document.getElementById('status').innerText = "Route ready. Building stops...";
            routeLineCoordinates = e.routes[0].coordinates;
            
            const cachedData = localStorage.getItem(CACHE_KEY);
            const cacheTimestamp = localStorage.getItem(CACHE_KEY + '_time');
            const now = Date.now();

            if (cachedData && cacheTimestamp && (now - cacheTimestamp < CACHE_EXPIRY_MS)) {
                document.getElementById('status').innerText = "Stops active (Offline Cache)";
                document.getElementById('clear-cache-btn').classList.remove('hidden');
                rawPoiDataMemory = JSON.parse(cachedData);
                processAndRenderPOIs(rawPoiDataMemory);
            } else {
                fetchPOIsFromOverpassCorridor();
            }
        });

        function fetchPOIsFromOverpassCorridor() {
            document.getElementById('poi-loader').classList.remove('hidden');

            const overpassQuery = `
                [out:json][timeout:60][bbox:35.0,-83.0,36.5,-78.0];
                (
                  node["brand"~"Sheetz|Chipotle|Jersey Mike|McDonald's|Wendy's|Chick-fil-A",i];
                  node["name"~"Sheetz|Chipotle|Jersey Mike|McDonald's|Wendy's|Chick-fil-A",i];
                  node["leisure"="playground"]["access"!~"private|no"];
                  way["leisure"="playground"]["access"!~"private|no"];
                );
                out center;`;

            const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(overpassQuery);

            fetch(url)
                .then(res => { if (!res.ok) throw new Error("Throttled"); return res.json(); })
                .then(data => {
                    document.getElementById('poi-loader').classList.add('hidden');
                    try {
                        localStorage.setItem(CACHE_KEY, JSON.stringify(data.elements));
                        localStorage.setItem(CACHE_KEY + '_time', Date.now().toString());
                        document.getElementById('clear-cache-btn').classList.remove('hidden');
                    } catch(e) {}
                    
                    document.getElementById('status').innerText = "All stops loaded successfully.";
                    rawPoiDataMemory = data.elements;
                    processAndRenderPOIs(rawPoiDataMemory);
                })
                .catch(err => {
                    document.getElementById('poi-loader').classList.add('hidden');
                    document.getElementById('status').innerText = "Stops active (Local Demo Mode)";
                    rawPoiDataMemory = FALLBACK_POI_DATABASE;
                    processAndRenderPOIs(rawPoiDataMemory);
                });
        }

        function getPoiCategory(tags) {
            if (tags.leisure === 'playground') return 'playground';
            const text = ((tags.name || '') + ' ' + (tags.brand || '')).toLowerCase();
            if (text.includes('sheetz')) return 'sheetz';
            if (text.includes('chipotle')) return 'chipotle';
            if (text.includes('jersey mike')) return 'jerseymikes';
            if (text.includes('mcdonald')) return 'mcdonalds';
            if (text.includes('wendy')) return 'wendys';
            if (text.includes('chick-fil-a') || text.includes('chick fil a')) return 'chickfila';
            return 'food';
        }

        function processAndRenderPOIs(elements) {
            // Remove existing markers from map array references
            allPoiMarkers.forEach(item => map.removeLayer(item.marker));
            allPoiMarkers = [];

            const sliceRate = 8;
            const targetRouteSlice = [];
            for(let i = 0; i < routeLineCoordinates.length; i += sliceRate) {
                targetRouteSlice.push(routeLineCoordinates[i]);
            }

            elements.forEach(element => {
                const lat = element.lat || (element.center && element.center.lat);
                const lon = element.lon || (element.center && element.center.lon);
                if (!lat || !lon) return;

                let minDistanceMeters = Infinity;
                for (let j = 0; j < targetRouteSlice.length; j++) {
                    const distance = map.distance([lat, lon], [targetRouteSlice[j].lat, targetRouteSlice[j].lng]);
                    if (distance < minDistanceMeters) minDistanceMeters = distance;
                }

                // Checked evaluation against the active buffer variable constraint
                if (minDistanceMeters > activeBufferMeters) return;

                const tags = element.tags || {};
                const category = getPoiCategory(tags);
                const config = poiConfigs[category] || poiConfigs['food'];

                let name = tags.name || config.name;
                let hours = tags.opening_hours || "Hours not listed (Check online)";
                let description = tags.description || (category === 'playground' ? `Public community playground facility.` : `Verified location off the highway corridor.`);
                let imageUrl = tags.image || config.img;

                // iOS Navigation Action URLs
                const appleMapsUrl = `https://maps.apple.com/?daddr=${lat},${lon}`;
                const streetViewUrl = `https://www.google.com/maps/?q=&layer=c&cbll=${lat},${lon}`;

                const popupContent = `
                    <div class="max-w-[220px] font-sans p-0.5">
                        <img src="${imageUrl}" class="w-full h-24 object-cover rounded-lg mb-2 shadow-sm" onerror="this.style.display='none'">
                        <h3 class="text-xs font-bold text-gray-900">${name}</h3>
                        <p class="text-[11px] text-gray-500 leading-tight my-1">${description}</p>
                        <div class="border-t border-gray-100 pt-1.5 mt-1.5">
                            <span class="text-[9px] uppercase font-bold text-gray-400 block tracking-wider">Hours</span>
                            <p class="text-xs text-gray-700 italic font-medium">${hours}</p>
                        </div>
                        <div class="mt-3 flex flex-col gap-1.5">
                            <a href="${appleMapsUrl}" target="_blank" class="block text-center bg-blue-600 text-white text-[11px] font-bold py-2.5 rounded-xl shadow-sm active:bg-blue-700 min-h-[36px]">🗺️ Route in Apple Maps</a>
                            <a href="${streetViewUrl}" target="_blank" class="block text-center bg-gray-900 text-white text-[11px] font-bold py-2.5 rounded-xl shadow-sm active:bg-black min-h-[36px]">👁️ View Street View</a>
                        </div>
                    </div>
                `;

                const marker = L.marker([lat, lon], {
                    icon: createCustomIcon(config.label, config.bg)
                }).bindPopup(popupContent, { className: 'custom-popup' });

                allPoiMarkers.push({ marker: marker, category: category });

                if (activeFilter === 'all' || activeFilter === category) {
                    marker.addTo(map);
                }
            });
        }

        // Buffer Dropdown Switch Execution Engine
        document.getElementById('buffer-select').addEventListener('change', (e) => {
            activeBufferMeters = parseInt(e.target.value);
            if (rawPoiDataMemory.length > 0) {
                processAndRenderPOIs(rawPoiDataMemory);
            }
        });

        // Horizontal Slider Touch Event Delegation Routing
        document.getElementById('filter-bar').addEventListener('click', (e) => {
            const pill = e.target.closest('.filter-pill');
            if (!pill) return;

            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.className = "filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]";
            });
            pill.className = "filter-pill bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm whitespace-nowrap min-h-[44px]";
            
            activeFilter = pill.getAttribute('data-filter');

            allPoiMarkers.forEach(item => {
                if (activeFilter === 'all' || item.category === activeFilter) {
                    if (!map.hasLayer(item.marker)) item.marker.addTo(map);
                } else {
                    if (map.hasLayer(item.marker)) map.removeLayer(item.marker);
                }
            });
        });

        // Reset Storage Handler
        document.getElementById('clear-cache-btn').addEventListener('click', () => {
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(CACHE_KEY + '_time');
            location.reload();
        });

        // Mobile Geolocation Tracking Engine
        const geoBtn = document.getElementById('geo-btn');
        let isTracking = false;
        let watchId = null;

        geoBtn.addEventListener('click', () => {
            if (isTracking) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                isTracking = false;
                geoBtn.innerText = "📍 Track";
                geoBtn.className = "bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]";
            } else {
                if (!navigator.geolocation) { alert("GPS module missing."); return; }
                geoBtn.innerText = "🛑 Stop";
                geoBtn.className = "bg-red-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]";
                isTracking = true;

                watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        if (!userMarker) {
                            userMarker = L.marker([latitude, longitude], { icon: createCustomIcon('🚗', 'bg-blue-500 border-white text-white') }).addTo(map);
                        } else {
                            userMarker.setLatLng([latitude, longitude]);
                        }
                        map.panTo([latitude, longitude]);
                    },
                    (err) => {
                        alert("Enable location access rules inside your iOS Safari Privacy settings panel.");
                        isTracking = false;
                        geoBtn.innerText = "📍 Track";
                        geoBtn.className = "bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]";
                    },
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                );
            }
        });
    </script>
</body>
</html>
