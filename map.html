<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>High-Performance Hybrid Route Explorer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111827;
        }
        #map { height: 100%; width: 100%; z-index: 1; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .leaflet-routing-container, .leaflet-routing-error, .leaflet-right { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 14px; padding: 1px; max-width: 210px !important;
            overflow: hidden; background-color: #ffffff;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        .custom-popup .leaflet-popup-content { margin: 6px !important; max-width: 198px !important; }
        .custom-popup .leaflet-popup-content a, .custom-popup .leaflet-popup-content button {
            color: #ffffff !important; text-decoration: none !important;
        }
    </style>
</head>
<body class="flex flex-col justify-end">

    <div class="absolute top-0 left-0 right-0 z-10 bg-white/95 backdrop-blur-md border-b border-gray-200 safe-top shadow-md flex flex-col transition-all duration-300">
        
        <div id="search-container" class="px-4 pt-3 pb-2 flex flex-col gap-2">
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                <div class="relative flex-1">
                    <input id="start-input" type="text" autocomplete="off" placeholder="Start Address, City, State, Zip Code" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl pl-3 pr-16 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px] text-zinc-900 font-medium">
                    <button id="start-clear-btn" type="button" class="absolute right-9 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-red-500 transition-colors font-bold text-xs hidden">✕</button>
                    <button id="start-locate-btn" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-blue-600 transition-colors">📍</button>
                    <div id="start-autocomplete" class="absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-2xl hidden max-h-48 overflow-y-auto z-50 text-sm"></div>
                </div>
                
                <button id="swap-locations-btn" type="button" class="self-center p-2 bg-gray-100 hover:bg-gray-200 text-gray-700 active:scale-95 rounded-xl text-sm font-bold transition-all min-h-[44px] min-w-[44px] flex items-center justify-center shadow-sm">⇆</button>
                
                <div class="relative flex-1">
                    <input id="end-input" type="text" autocomplete="off" placeholder="Destination Address, City, State, Zip Code" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl pl-3 pr-16 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px] text-zinc-900 font-medium">
                    <button id="end-clear-btn" type="button" class="absolute right-9 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-red-500 transition-colors font-bold text-xs hidden">✕</button>
                    <button id="end-locate-btn" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-blue-600 transition-colors">📍</button>
                    <div id="end-autocomplete" class="absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-2xl hidden max-h-48 overflow-y-auto z-50 text-sm"></div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="route-btn" class="w-full bg-gray-900 active:bg-black text-white text-xs font-bold py-2 px-4 rounded-xl min-h-[44px] shadow-sm transition-all flex items-center justify-center gap-1">
                    🗺️ Calculate Dynamic Route
                </button>
            </div>
        </div>

        <div class="px-4 py-2 flex justify-between items-center gap-2 border-t border-gray-100 bg-gray-50/50">
            <div class="flex items-center gap-2 flex-1 min-w-0">
                <div id="status-spinner" class="animate-spin rounded-full h-3.5 w-3.5 border-2 border-blue-600 border-t-transparent hidden"></div>
                <p id="status" class="text-xs font-bold text-gray-700 truncate">System ready. Enter route parameters above.</p>
            </div>
            <div class="flex items-center gap-1.5 shrink-0 overflow-x-auto no-scrollbar max-w-[70%] sm:max-w-none">
                <select id="buffer-select" class="bg-white text-gray-700 text-xs font-bold py-2 px-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 min-h-[44px]">
                    <option value="4000" selected>⏱️ 5 Min Buffer</option>
                    <option value="12000">⏱️ 15 Min Buffer</option>
                    <option value="24000">⏱️ 30 Min Buffer</option>
                </select>
                <button id="theme-toggle-btn" class="bg-white border border-gray-200 text-gray-700 text-xs font-bold px-3 py-2 rounded-xl min-h-[44px] active:bg-gray-100 whitespace-nowrap">🌙 Mode</button>
                <button id="push-master-btn" class="bg-amber-500 hover:bg-amber-600 text-zinc-950 text-xs font-black px-3 py-2 rounded-xl min-h-[44px] shadow-sm active:scale-95 transition-all whitespace-nowrap">💾 Save Repo Favorites</button>
                <button id="reset-fav-cache-btn" class="bg-zinc-800 hover:bg-zinc-700 text-white text-xs font-bold px-3 py-2 rounded-xl min-h-[44px] shadow-sm active:scale-95 transition-all whitespace-nowrap">🔄 Sync Global Base</button>
                <button id="toggle-search-btn" class="bg-white border border-gray-200 text-gray-700 text-xs font-bold px-3 py-2 rounded-xl min-h-[44px] whitespace-nowrap">🔍 Inputs</button>
                <button id="geo-btn" class="bg-blue-600 active:bg-blue-700 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px] whitespace-nowrap">🚗 Track</button>
            </div>
        </div>

        <div id="master-filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pt-2 pb-1.5 border-t border-gray-100">
            <button data-cat="playground" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🛝 Playgrounds</button>
            <button data-cat="gas" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">⛽ Gas Stations</button>
            <button data-cat="food" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🍔 Fast Food</button>
            <button data-cat="parks" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🌲 Parks & Attractions</button>
            <button data-cat="medical" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🏥 Emergency & Med</button>
            <button data-cat="highway" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🏢 Highway Amenities</button>
            <button data-cat="tourism" class="master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]">🌲 Tourism Exploration</button>
        </div>

        <div id="sub-filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pb-3 pt-1.5 border-t border-gray-100 bg-gray-50/70 hidden"></div>
    </div>

    <div id="next-stop-hud" class="absolute top-44 right-4 z-10 bg-slate-900/95 backdrop-blur-md text-white border border-slate-700 p-3 rounded-xl shadow-xl max-w-[200px] hidden pointer-events-none transition-all duration-300">
        <p class="text-[9px] font-black uppercase text-blue-400 tracking-widest leading-none mb-1">⏱️ Next Target Stop</p>
        <h4 id="hud-poi-name" class="text-xs font-black truncate text-white">---</h4>
        <p id="hud-poi-dist" class="text-sm font-black text-amber-400 mt-0.5">0.0 mi away</p>
    </div>

    <div class="absolute bottom-24 right-4 z-10 flex flex-col gap-2">
        <button id="zoom-in-btn" class="bg-white/95 backdrop-blur-md text-zinc-900 border border-gray-200 shadow-xl font-bold rounded-xl w-11 h-11 flex items-center justify-center active:scale-95 text-xl transition-all select-none cursor-pointer">＋</button>
        <button id="zoom-out-btn" class="bg-white/95 backdrop-blur-md text-zinc-900 border border-gray-200 shadow-xl font-bold rounded-xl w-11 h-11 flex items-center justify-center active:scale-95 text-xl transition-all select-none cursor-pointer">－</button>
    </div>

    <div id="route-mileage-sticky" class="absolute bottom-6 left-4 z-10 bg-slate-900/95 backdrop-blur-md text-white border border-slate-700 px-4 py-2.5 rounded-xl shadow-xl hidden font-black text-xs transition-all duration-300 pointer-events-auto">
        🏁 Route Remaining: <span id="sticky-total-dist" class="text-emerald-400 font-black">0.0</span> mi
    </div>

    <div id="map"></div>

    <div id="toast-container" class="absolute bottom-6 right-4 left-4 sm:left-auto z-50 flex flex-col gap-2 pointer-events-none max-w-sm safe-bottom"></div>

    <script>
        // =======================================================
        // --- PHASE 1: HOISTED UTILITIES & MARKER ICON BUILDERS ---
        // =======================================================
        function triggerToast(text, duration = 3000) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = "bg-gray-900/95 backdrop-blur-sm text-white text-xs font-semibold px-4 py-3 rounded-xl shadow-lg flex items-center transition-all duration-300 opacity-0 translate-y-2 pointer-events-auto";
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 50);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-1');
                setTimeout(() => { toast.remove(); }, 300);
            }, duration);
        }

        function updateInlineStatus(text, showSpinner = false) {
            const statusLabel = document.getElementById('status');
            if (statusLabel) statusLabel.innerText = text;
            const spinner = document.getElementById('status-spinner');
            if (spinner) {
                if (showSpinner) spinner.classList.remove('hidden');
                else spinner.classList.add('hidden');
            }
        }

        function buildCleanAddressString(addr, displayNameFallback) {
            if (!addr) return displayNameFallback.split(',').slice(0, 3).join(',');
            let tokens = [];
            const roadLine = addr.house_number && addr.road ? `${addr.house_number} ${addr.road}` : (addr.road || '');
            if (roadLine) tokens.push(roadLine);
            if (addr.city || addr.town || addr.village || addr.suburb) tokens.push(addr.city || addr.town || addr.village || addr.suburb);
            if (addr.state) tokens.push(addr.state);
            if (addr.postcode) tokens.push(addr.postcode);
            return tokens.length > 0 ? tokens.join(', ') : displayNameFallback.split(',').slice(0, 3).join(',');
        }

        // Enforce robust category configuration checks for dynamic styles
        function createCustomIcon(label, classes, isLarge = false) {
            const sizeClass = isLarge ? 'w-11 h-11 text-xl border-3' : 'w-8 h-8 text-sm border-2';
            const sizePx = isLarge ? 44 : 32;
            return L.divIcon({
                html: `<div class="flex items-center justify-center rounded-full shadow-md font-bold ${sizeClass} ${classes}">${label}</div>`,
                className: '', iconSize: [sizePx, sizePx], iconAnchor: [sizePx / 2, sizePx / 2], popupAnchor: [0, -sizePx / 4]
            });
        }

        function createStarredIcon(label, isLarge = false) {
            const wrapperSize = isLarge ? 'w-11 h-11 text-xl border-3' : 'w-8 h-8 text-sm border-2';
            const sizePx = isLarge ? 44 : 32;
            return L.divIcon({
                html: `<div class="flex items-center justify-center rounded-full bg-gradient-to-br from-amber-300 via-yellow-400 to-amber-500 border-amber-600 text-black shadow-md font-black relative ${wrapperSize}">${label}<span class="absolute -bottom-1 -right-1 text-[10px] drop-shadow-sm">⭐</span></div>`,
                className: '', iconSize: [sizePx, sizePx], iconAnchor: [sizePx / 2, sizePx / 2], popupAnchor: [0, -sizePx / 4]
            });
        }

        function createRouteMarkerIcon(label, classes) {
            return L.divIcon({
                html: `<div class="flex items-center justify-center rounded-full shadow-md font-bold w-8 h-8 text-sm border-2 ${classes}">${label}</div>`,
                className: '', iconSize: [32, 32], iconAnchor: [16, 16]
            });
        }

        function dispatchOffThreadAnalysis() {
            if (routeLineCoordinates.length === 0) return;
            const sliceRate = Math.max(8, Math.ceil(routeLineCoordinates.length / 52));
            activeTargetsSliceMemory = [];
            for(let i = 0; i < routeLineCoordinates.length; i += sliceRate) { activeTargetsSliceMemory.push(routeLineCoordinates[i]); }
            if (routeLineCoordinates.length > 0) activeTargetsSliceMemory.push(routeLineCoordinates[routeLineCoordinates.length - 1]);

            mathWorker.postMessage({
                localElements: localJsonMemory,
                targetsSlice: activeTargetsSliceMemory, activeBufferMeters: activeBufferMeters,
                currentMasterCat: currentMasterCat, currentSubFilter: currentSubFilter
            });
        }

        // ==========================================
        // --- PHASE 2: GLOBAL ENVIRONMENT KEYS ---
        // ==========================================
        const MAP_INITIAL_CENTER = [35.7796, -78.6382]; 
        const autocompleteQueryMemoryCache = new Map(); 
        
        const categoryConfigs = {
            playground: { label: '🛝', bg: 'bg-emerald-600 border-emerald-200 text-white', name: 'Public Playground', img: 'https://images.unsplash.com/photo-1596464716127-f2a82984de30?auto=format&fit=crop&w=300&q=80' },
            gas: { label: '⛽', bg: 'bg-amber-600 border-amber-200 text-white', name: 'Gas Station', img: 'https://images.unsplash.com/photo-1527018601619-a508a2be00cd?auto=format&fit=crop&w=300&q=80' },
            food: { label: '🍟', bg: 'bg-red-600 border-red-200 text-white', name: 'Fast Food', img: 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=300&q=80' },
            chipotle: { label: '🌯', bg: 'bg-amber-800 border-amber-500 text-white', name: 'Chipotle', img: 'https://images.unsplash.com/photo-1562059390-a761a0847685?auto=format&fit=crop&w=300&q=80' },
            starbucks: { label: '☕', bg: 'bg-emerald-800 border-emerald-500 text-white', name: 'Starbucks Coffee', img: 'https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&w=300&q=80' },
            coffee: { label: '☕', bg: 'bg-amber-950 border-amber-800 text-white', name: 'Coffee Shop', img: 'https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&w=300&q=80' },
            mcdonalds: { label: '🍔', bg: 'bg-yellow-500 border-yellow-300 text-zinc-900', name: "McDonald's", img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=300&q=80' },
            chickfila: { label: '🐄', bg: 'bg-red-700 border-red-400 text-white', name: 'Chick-fil-A', img: 'https://images.unsplash.com/photo-1610614819513-58e34989848b?auto=format&fit=crop&w=300&q=80' },
            raisingcanes: { label: '🍗', bg: 'bg-orange-500 border-orange-300 text-white', name: "Raising Cane's", img: 'https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=300&q=80' },
            jerseymikes: { label: '🐖', bg: 'bg-blue-800 border-blue-400 text-white', name: "Jersey Mike's", img: 'https://images.unsplash.com/photo-1509722747041-616f39b57569?auto=format&fit=crop&w=300&q=80' },
            parks: { label: '🌲', bg: 'bg-emerald-700 border-emerald-500 text-white', name: 'Parks & Attractions', img: 'https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=300&q=80' },
            attraction: { label: '🎡', bg: 'bg-purple-600 border-purple-300 text-white', name: 'Tourist Attraction', img: 'https://images.unsplash.com/photo-1473163928189-364b2c4e1135?auto=format&fit=crop&w=300&q=80' },
            national_park: { label: '🏞️', bg: 'bg-emerald-800 border-emerald-600 text-white', name: 'National Park', img: 'https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=300&q=80' },
            nature_reserve: { label: '🌲', bg: 'bg-emerald-700 border-emerald-500 text-white', name: 'Nature Reserve', img: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=300&q=80' },
            medical: { label: '🏥', bg: 'bg-rose-600 border-rose-400 text-white', name: 'Emergency Medical', img: 'https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=300&q=80' },
            hospital: { label: '🏥', bg: 'bg-rose-600 border-rose-400 text-white', name: 'Major Hospital', img: 'https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=300&q=80' },
            veterinary: { label: '🐕', bg: 'bg-indigo-500 border-indigo-300 text-white', name: 'Veterinary Clinic', img: 'https://images.unsplash.com/photo-1581888227599-779811939961?auto=format&fit=crop&w=300&q=80' },
            highway_rest: { label: '🪑', bg: 'bg-blue-600 border-blue-200 text-white', name: 'Rest Area', img: 'https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?auto=format&fit=crop&w=300&q=80' },
            highway_toilets: { label: '🚻', bg: 'bg-indigo-600 border-indigo-200 text-white', name: 'Public Restroom', img: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=300&q=80' },
            tourism_viewpoint: { label: '📷', bg: 'bg-sky-500 border-sky-200 text-white', name: 'Scenic Viewpoint', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=300&q=80' },
            tourism_dogpark: { label: '🐕', bg: 'bg-violet-600 border-violet-200 text-white', name: 'Dog Park', img: 'https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=300&q=80' }
        };

        const cleanBrandNames = {
            "sheetz": "Sheetz", "murphyexpress": "Murphy Express", "bucees": "Buc-ee's",
            "costcogas": "Costco Gasoline", "wawa": "Wawa", "circlek": "Circle K",
            "mcdonalds": "McDonald's", "wendys": "Wendy's", "chickfila": "Chick-fil-A",
            "chipotle": "Chipotle", "jerseymikes": "Jersey Mike's", "raisingcanes": "Raising Cane's",
            "starbucks": "Starbucks", "hospital": "Major Hospital", "veterinary": "Veterinary Clinic",
            "national_park": "National Park", "nature_reserve": "Nature Reserve", "attraction": "Tourist Attraction"
        };

        // Embedded Starbucks Sub-Pill Routing Targets directly within food category configurations
        const subMenuDefinitions = {
            playground: [{ id: 'all', label: 'All Public Parks' }],
            gas: [{ id: 'all', label: 'All Selected Chains' }, { id: 'unl87', label: 'UNL 87 Listed' }, { id: 'unl88', label: 'UNL 88 / E15' }],
            food: [
                { id: 'all', label: 'All Brands' }, 
                { id: 'starbucks', label: '☕ Starbucks' },
                { id: 'chipotle', label: 'Chipotle' }, 
                { id: 'raisingcanes', label: "Raising Cane's" }, 
                { id: 'chickfila', label: 'Chick-fil-A' }, 
                { id: 'mcdonalds', label: "McDonald's" }, 
                { id: 'jerseymikes', label: "Jersey Mike's" }
            ],
            parks: [{ id: 'all', label: 'All Parks & Attractions' }, { id: 'national_park', label: '🏞️ National Parks' }, { id: 'nature_reserve', label: '🌲 Nature Reserves' }, { id: 'attraction', label: '🎡 Attractions' }],
            medical: [{ id: 'all', label: 'All Infrastructure' }, { id: 'hospital', label: '🏥 Major Hospitals' }, { id: 'veterinary', label: '🐕 Vet Clinics' }],
            highway: [{ id: 'highway_rest', label: '🪑 Highway Rest Areas' }, { id: 'highway_toilets', label: '🚻 Standalone Restrooms' }],
            tourism: [{ id: 'tourism_viewpoint', label: 'Scenic Overlooks' }, { id: 'tourism_dogpark', label: 'Fenced Dog Parks' }]
        };

        let allPoiMarkersMemoryMap = [];
        let globalFavoritesMarkers = []; 
        let repoFavoritesMemory = [];    
        let localJsonMemory = null; 
        let routeLineCoordinates = [];
        let userMarker = null;
        let lastUserGpsCoord = null;
        let currentMasterCat = null;
        let currentSubFilter = 'all';
        let activeBufferMeters = 4000; 
        let mapStyleMode = 'light';
        let activeTargetsSliceMemory = [];
        let routeBufferPolyline = null;

        // Auto-Center Operational Flags
        let allowAutoCenter = true;
        let autoCenterTimeoutId = null;

        // ==========================================
        // --- PHASE 3: MAP TILES & LAYER ENGINE ----
        // ==========================================
        const map = L.map('map', { zoomControl: false, tap: true, preferCanvas: true }).setView(MAP_INITIAL_CENTER, 8);
        
        const mapLayersPool = {
            light: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' })
        };
        mapLayersPool[mapStyleMode].addTo(map);

        const poiClusterGroup = L.layerGroup().addTo(map);

        let routingControl = L.Routing.control({
            show: false, 
            addWaypoints: true, 
            draggableWaypoints: true,
            serviceUrl: 'https://router.project-osrm.org/route/v1',
            router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
            lineOptions: {
                styles: [
                    { color: '#0f172a', opacity: 0.25, weight: 14 }, 
                    { color: '#2563eb', opacity: 0.9, weight: 10 },    
                    { color: '#60a5fa', opacity: 1, weight: 4 }      
                ]
            },
            createMarker: function(i, wp, n) {
                let iconLabel = '⚓';
                let bgClass = 'bg-blue-600 border-white text-white';
                if (i === 0) { iconLabel = '🏁'; bgClass = 'bg-emerald-600 border-white text-white'; }
                else if (i === n - 1) { iconLabel = '🛑'; bgClass = 'bg-red-600 border-white text-white'; }
                
                let marker = L.marker(wp.latLng, { 
                    draggable: true, icon: createRouteMarkerIcon(iconLabel, bgClass) 
                });

                if (i > 0 && i < n - 1) {
                    marker.on('click', function() {
                        if (confirm("Delete this custom reroute anchor point?")) {

                            currentWaypoints.splice(i, 1);

        }).addTo(map);

        function updateBufferVisualizerWeight() {
            if (!routeBufferPolyline || routeLineCoordinates.length === 0) return;
            const currentMapCenterLatitude = map.getCenter().lat;
            const currentZoomLevel = map.getZoom();
            const metersPerPixel = (40075016.686 * Math.cos(currentMapCenterLatitude * Math.PI / 180)) / Math.pow(2, currentZoomLevel + 8);
            const calculatedPixelWidthWeight = (activeBufferMeters / metersPerPixel) * 2;
            
            routeBufferPolyline.setStyle({ weight: Math.max(4, calculatedPixelWidthWeight) });
        }

        routingControl.on('routesfound', function(e) {
            routeLineCoordinates = e.routes[0].coordinates;
            const searchContainer = document.getElementById('search-container');
            if (searchContainer) searchContainer.classList.add('hidden');
            
            const totalDistanceMeters = e.routes[0].summary.totalDistance;
            const totalDistanceMiles = (totalDistanceMeters * 0.000621371).toFixed(1);
            const stickyPanel = document.getElementById('route-mileage-sticky');
            if (stickyPanel) {
                document.getElementById('sticky-total-dist').innerText = totalDistanceMiles;
                stickyPanel.classList.remove('hidden');
            }

            poiClusterGroup.clearLayers();
            allPoiMarkersMemoryMap = [];
            
            if (routeBufferPolyline) { map.removeLayer(routeBufferPolyline); }
            routeBufferPolyline = L.polyline(routeLineCoordinates, {
                color: '#3b82f6', opacity: 0.15, lineCap: 'round', lineJoin: 'round', interactive: false
            }).addTo(map);
            routeBufferPolyline.bringToBack();
            updateBufferVisualizerWeight();

            renderGlobalPermanentStars(); 
            
            if (currentMasterCat) {
                runDataExecutionLayer(currentMasterCat);
                triggerToast("Recalculating corridor points around detour path...", 2000);
            } else {
                updateInlineStatus("Route ready. Tap filters below.");
                triggerToast("Route generated. Content deferred until filter selection.");
            }
        });

        // ==============================================================
        // --- PHASE 4: HIGH-SPEED WORKER MATRIX (LOCAL METRICS ONLY) ---
        // ==============================================================
        const workerBlobCode = `
            function haversineDist(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
            }

            self.onmessage = function(e) {
                const { localElements, targetsSlice, activeBufferMeters, currentMasterCat, currentSubFilter } = e.data;
                const finalMatches = [];
                
                if (!localElements) {
                    self.postMessage({ sortedMatches: [] });
                    return;
                }

                let minTlat = 90, maxTlat = -90, minTlon = 180, maxTlon = -180;
                for(let j=0; j<targetsSlice.length; j++) {
                    if (targetsSlice[j].lat < minTlat) minTlat = targetsSlice[j].lat;
                    if (targetsSlice[j].lat > maxTlat) maxTlat = targetsSlice[j].lat;
                    if (targetsSlice[j].lng < minTlon) minTlon = targetsSlice[j].lng;
                    if (targetsSlice[j].lng > maxTlon) maxTlon = targetsSlice[j].lng;
                }
                const degPad = (activeBufferMeters + 2000) / 111000;
                const spatialEnvelope = { n: maxTlat + degPad, s: minTlat - degPad, e: maxTlon + degPad, w: minTlon - degPad };

                localElements.forEach(el => {
                    let normBrand = (el.b || '');
                    let normCat = el.c;

                    // NORMALIZATION LAYER: Group coffee or Starbucks into food master class boundaries
                    let effectiveCat = normCat;
                    if (normCat === 'coffee' || normBrand === 'starbucks') {
                        effectiveCat = 'food';
                    }

                    if (effectiveCat !== currentMasterCat) return;
                    
                    if (el.lat > spatialEnvelope.n || el.lat < spatialEnvelope.s || el.lon > spatialEnvelope.e || el.lon < spatialEnvelope.w) return;
                    
                    if (currentSubFilter === 'unl87' && el.g87 !== 1) return;
                    if (currentSubFilter === 'unl88' && el.g88 !== 1) return;
                    if (currentSubFilter !== 'all' && currentSubFilter !== 'unl87' && currentSubFilter !== 'unl88' && normBrand !== currentSubFilter) return;

                    let minD = Infinity;
                    for (let j = 0; j < targetsSlice.length; j++) {
                        const d = haversineDist(el.lat, el.lon, targetsSlice[j].lat, targetsSlice[j].lng);
                        if (d < minD) minD = d;
                    }

                    if (minD <= activeBufferMeters) {
                        finalMatches.push({
                            id: "local_" + el.lat + "_" + el.lon, lat: el.lat, lon: el.lon,
                            name: el.n, brand: normBrand, category: effectiveCat, hours: el.h || "Hours not listed",
                            desc: el.d || "", minD: minD, isLocal: true, g87: el.g87, g88: el.g88
                        });
                    }
                });

                const sortedMatches = finalMatches.sort((a, b) => a.minD - b.minD);
                self.postMessage({ sortedMatches });
            };
        `;
        const blobObj = new Blob([workerBlobCode], { type: 'application/javascript' });
        const mathWorker = new Worker(URL.createObjectURL(blobObj));

        function runCachedAutocompleteSearch(inputElement, dropdownElement) {
            const query = inputElement.value.trim();
            const clearBtn = document.getElementById(inputElement.id === 'start-input' ? 'start-clear-btn' : 'end-clear-btn');
            
            if (query.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');

            if (query.length < 3) {
                dropdownElement.innerHTML = '';
                dropdownElement.classList.add('hidden');
                return;
            }

            if (autocompleteQueryMemoryCache.has(query)) {
                renderAutocompleteDropdownDOM(autocompleteQueryMemoryCache.get(query), inputElement, dropdownElement);
                return;
            }

            fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=6&addressdetails=1&countrycodes=us&q=${encodeURIComponent(query)}`)
            .then(res => { if (!res.ok) throw new Error(); return res.json(); })
            .then(data => {
                autocompleteQueryMemoryCache.set(query, data);
                renderAutocompleteDropdownDOM(data, inputElement, dropdownElement);
            }).catch(() => {});
        }

        function renderAutocompleteDropdownDOM(data, inputElement, dropdownElement) {
            dropdownElement.innerHTML = '';
            if (!data || data.length === 0) {
                const noResult = document.createElement('div');
                noResult.className = "px-3 py-2.5 bg-gray-50 text-gray-500 italic text-xs select-none rounded-xl";
                noResult.innerText = "No locations found in the US";
                dropdownElement.appendChild(noResult);
                dropdownElement.classList.remove('hidden');
                return;
            }
            dropdownElement.classList.remove('hidden');

            data.forEach(item => {
                const cleanOutputString = buildCleanAddressString(item.address, item.display_name);
                const option = document.createElement('div');
                option.className = "px-3 py-2.5 bg-white hover:bg-blue-50 border-b border-gray-100 last:border-0 cursor-pointer truncate text-zinc-900 font-semibold text-xs transition-colors";
                option.innerText = cleanOutputString;

                option.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    inputElement.value = cleanOutputString;
                    inputElement.dataset.lat = item.lat;
                    inputElement.dataset.lon = item.lon;
                    dropdownElement.innerHTML = '';
                    dropdownElement.classList.add('hidden');
                    document.getElementById(inputElement.id === 'start-input' ? 'start-clear-btn' : 'end-clear-btn').classList.remove('hidden');
                });
                dropdownElement.appendChild(option);
            });
        }

        function initAutocomplete(inputId, dropdownId) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            let debounceTimer;

            input.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => { runCachedAutocompleteSearch(input, dropdown); }, 400);
            });
            
            input.addEventListener('blur', () => {
                setTimeout(() => { dropdown.classList.add('hidden'); }, 200);
            });
        }

        initAutocomplete('start-input', 'start-autocomplete');
        initAutocomplete('end-input', 'end-autocomplete');

        document.getElementById('start-clear-btn').addEventListener('click', (e) => {
            const input = document.getElementById('start-input');
            input.value = ''; delete input.dataset.lat; delete input.dataset.lon;
            e.target.classList.add('hidden');
        });

        document.getElementById('end-clear-btn').addEventListener('click', (e) => {
            const input = document.getElementById('end-input');
            input.value = ''; delete input.dataset.lat; delete input.dataset.lon;
            e.target.classList.add('hidden');
        });

        document.getElementById('swap-locations-btn').addEventListener('click', () => {
            const startInput = document.getElementById('start-input');
            const endInput = document.getElementById('end-input');
            const startClear = document.getElementById('start-clear-btn');
            const endClear = document.getElementById('end-clear-btn');

            const tempVal = startInput.value; startInput.value = endInput.value; endInput.value = tempVal;
            const tempLat = startInput.dataset.lat; startInput.dataset.lat = endInput.dataset.lat || ''; endInput.dataset.lat = tempLat || '';
            const tempLon = startInput.dataset.lon; startInput.dataset.lon = endInput.dataset.lon || ''; endInput.dataset.lon = tempLon || '';

            if (startInput.value.length > 0) startClear.classList.remove('hidden'); else startClear.classList.add('hidden');
            if (endInput.value.length > 0) endClear.classList.remove('hidden'); else endClear.classList.add('hidden');

            triggerToast("Swapped start & final parameters.");
        });

        function computeTargetCenteringNode() {
            if (routeLineCoordinates.length > 0 && lastUserGpsCoord) {
                const routeBoundsCenter = L.polyline(routeLineCoordinates).getBounds().getCenter();
                return L.latLng((routeBoundsCenter.lat + lastUserGpsCoord[0]) / 2, (routeBoundsCenter.lng + lastUserGpsCoord[1]) / 2);
            } else if (routeLineCoordinates.length > 0) {
                return L.polyline(routeLineCoordinates).getBounds().getCenter();
            } else if (lastUserGpsCoord) {
                return L.latLng(lastUserGpsCoord[0], lastUserGpsCoord[1]);
            }
            return map.getCenter();
        }

        document.getElementById('zoom-in-btn').addEventListener('click', () => {
            map.setView(computeTargetCenteringNode(), map.getZoom() + 1);
        });

        document.getElementById('zoom-out-btn').addEventListener('click', () => {
            map.setView(computeTargetCenteringNode(), map.getZoom() - 1);
        });

        document.addEventListener('mousedown', (e) => {
            const startDrop = document.getElementById('start-autocomplete');
            const endDrop = document.getElementById('end-autocomplete');
            if (!document.getElementById('search-container').contains(e.target)) {
                if (startDrop) startDrop.classList.add('hidden');
                if (endDrop) endDrop.classList.add('hidden');
            }
        });

        function generateSubMenuUI(catId) {
            const subBar = document.getElementById('sub-filter-bar'); subBar.innerHTML = '';
            const definition = subMenuDefinitions[catId]; if (!definition) { subBar.classList.add('hidden'); return; }
            definition.forEach((sub, index) => {
                const subButton = document.createElement('button'); subButton.setAttribute('data-sub', sub.id);
                subButton.className = index === 0 ? "sub-pill bg-gray-900 text-white text-xs font-bold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]" : "sub-pill bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]";
                subButton.innerText = sub.label; subBar.appendChild(subButton);
            });
            subBar.classList.remove('hidden');
        }

        function hideSubMenu() {
            const subBar = document.getElementById('sub-filter-bar');
            if (subBar) subBar.classList.add('hidden');
            document.querySelectorAll('.master-pill').forEach(btn => btn.className = "master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]");
            currentMasterCat = null; currentSubFilter = 'all';
        }

        // ======================================================
        // --- PHASE 7: ELEMENT SELECTION COUPLING LISTENERS ---
        // ======================================================
        mathWorker.onmessage = function(e) {
            const { sortedMatches } = e.data;
            
            poiClusterGroup.clearLayers();
            allPoiMarkersMemoryMap = [];

            sortedMatches.forEach(el => {
                let isCoordinateOccupiedByStar = globalFavoritesMarkers.some(m => roundCoords(m.lat) === roundCoords(el.lat) && roundCoords(m.lon) === roundCoords(el.lon));
                if (isCoordinateOccupiedByStar) return;
                buildAndRenderPoiMarker(el, false);
            });

            const hud = document.getElementById('next-stop-hud');
            if (hud) {
                if (sortedMatches.length > 0) {
                    const nextStop = sortedMatches[0];
                    const distanceInMiles = (nextStop.minD * 0.000621371).toFixed(1);
                    document.getElementById('hud-poi-name').innerText = cleanBrandNames[nextStop.brand] || nextStop.name;
                    document.getElementById('hud-poi-dist').innerText = `${distanceInMiles} miles away`;
                    hud.classList.remove('hidden');
                } else { hud.classList.add('hidden'); }
            }
            updateInlineStatus("Stops active.");
        };

        function triggerAutoCenterDelay() {
            if (!isTracking) return;
            allowAutoCenter = false;
            clearTimeout(autoCenterTimeoutId);
            autoCenterTimeoutId = setTimeout(() => {
                allowAutoCenter = true;
                triggerToast("Auto-centering lock re-engaged.", 1000);
            }, 20000); 
        }

        map.on('movestart dragstart zoomstart', () => {
            triggerAutoCenterDelay();
        });

        map.on('zoomend moveend', () => {
            updateBufferVisualizerWeight();
            const isLarge = map.getZoom() > 13;

            allPoiMarkersMemoryMap.forEach(item => {
                const config = categoryConfigs[item.visualKey] || categoryConfigs['food'];
                item.marker.setIcon(createCustomIcon(config.label, config.bg, isLarge));
            });

            globalFavoritesMarkers.forEach(item => {
                const config = categoryConfigs[item.visualKey] || categoryConfigs['food'];
                item.marker.setIcon(createStarredIcon(config.label, isLarge));
            });
        });

        document.getElementById('theme-toggle-btn').addEventListener('click', (e) => {
            map.removeLayer(mapLayersPool[mapStyleMode]);
            mapStyleMode = mapStyleMode === 'light' ? 'dark' : 'light';
            mapLayersPool[mapStyleMode].addTo(map);
            e.target.innerText = mapStyleMode === 'light' ? "🌙 Dark" : "☀️ Light";
            triggerToast(`Map skin changed to ${mapStyleMode} mode layouts.`);
        });

        document.getElementById('reset-fav-cache-btn').addEventListener('click', async () => {
            triggerToast("Forcing baseline synchronization layer...", 1500);
            await loadMasterRepoFavoritesOnBoot(true);
            triggerToast("Local database synced up successfully! 🔄");
        });

        function handleMasterCategorySelection(element) {
            document.querySelectorAll('.master-pill').forEach(btn => btn.className = "master-pill bg-gray-100 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap min-h-[44px]");
            element.className = "master-pill bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm whitespace-nowrap min-h-[44px]";
            currentMasterCat = element.getAttribute('data-cat'); currentSubFilter = 'all'; 
            generateSubMenuUI(currentMasterCat); runDataExecutionLayer(currentMasterCat);
        }

        document.getElementById('master-filter-bar').addEventListener('click', (e) => { const pill = e.target.closest('.master-pill'); if (pill) handleMasterCategorySelection(pill); });
        document.getElementById('sub-filter-bar').addEventListener('click', (e) => {
            const subPill = e.target.closest('.sub-pill'); if (!subPill) return;
            document.querySelectorAll('.sub-pill').forEach(btn => btn.className = "sub-pill bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]");
            subPill.className = "sub-pill bg-gray-900 text-white text-xs font-bold px-3.5 py-1.5 rounded-md whitespace-nowrap min-h-[36px]";
            currentSubFilter = subPill.getAttribute('data-sub'); dispatchOffThreadAnalysis();
        });

        document.getElementById('buffer-select').addEventListener('change', (e) => { 
            activeBufferMeters = parseInt(e.target.value); 
            updateBufferVisualizerWeight();
            if (localJsonMemory) dispatchOffThreadAnalysis(); 
        });
        
        document.getElementById('toggle-search-btn').addEventListener('click', () => { const s = document.getElementById('search-container'); if (s) s.classList.toggle('hidden'); });
        document.getElementById('push-master-btn').addEventListener('click', launchAutomatedGitHubSyncPipeline);

        document.getElementById('route-btn').addEventListener('click', async () => {
            const startInput = document.getElementById('start-input'); const endInput = document.getElementById('end-input'); let startLatLng, endLatLng;
            if (startInput.dataset.lat && startInput.dataset.lon) { startLatLng = L.latLng(parseFloat(startInput.dataset.lat), parseFloat(startInput.dataset.lon)); }
            if (endInput.dataset.lat && endInput.dataset.lon) { endLatLng = L.latLng(parseFloat(endInput.dataset.lat), parseFloat(endInput.dataset.lon)); }
            if (!startLatLng || !endLatLng) { alert("Select suggested autocomplete options first."); return; }
            routingControl.setWaypoints([startLatLng, endLatLng]);
        });

        const geoBtn = document.getElementById('geo-btn'); let isTracking = false, watchId = null;
        geoBtn.addEventListener('click', () => {
            if (isTracking) { 
                if (watchId) navigator.geolocation.clearWatch(watchId); 
                isTracking = false; 
                allowAutoCenter = true;
                clearTimeout(autoCenterTimeoutId);
                geoBtn.innerText = "🚗 Track"; 
                geoBtn.className = "bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]"; 
            }
            else {
                if (!navigator.geolocation) { alert("GPS hardware unavailable."); return; }
                geoBtn.innerText = "🛑 Stop"; geoBtn.className = "bg-red-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]"; isTracking = true;
                
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    
                    if (lastUserGpsCoord) {
                        const distanceMoved = map.distance([latitude, longitude], lastUserGpsCoord);
                        if (distanceMoved < 25) return; 
                    }
                    lastUserGpsCoord = [latitude, longitude];

                    if (!userMarker) { userMarker = L.marker([latitude, longitude], { icon: createCustomIcon('🚗', 'bg-blue-500 border-white text-white', false) }).addTo(map); } else { userMarker.setLatLng([latitude, longitude]); }
                    
                    if (allowAutoCenter) {
                        map.panTo([latitude, longitude]);
                    }

                    if (routeLineCoordinates.length > 0) {
                        let minDistanceToRouteLine = Infinity;
                        let closestCoordinateIndex = 0;
                        for (let i = 0; i < routeLineCoordinates.length; i++) {
                            const d = map.distance([latitude, longitude], [routeLineCoordinates[i].lat, routeLineCoordinates[i].lng]);
                            if (d < minDistanceToRouteLine) {
                                minDistanceToRouteLine = d; closestCoordinateIndex = i;
                            }
                        }

                        let remainingDistanceMeters = 0;
                        for (let i = closestCoordinateIndex; i < routeLineCoordinates.length - 1; i++) {
                            remainingDistanceMeters += map.distance([routeLineCoordinates[i].lat, routeLineCoordinates[i].lng], [routeLineCoordinates[i+1].lat, routeLineCoordinates[i+1].lng]);
                        }
                        const remainingDistanceMiles = (remainingDistanceMeters * 0.000621371).toFixed(1);
                        const stickyLabelValue = document.getElementById('sticky-total-dist');
                        if (stickyLabelValue) stickyLabelValue.innerText = remainingDistanceMiles;

                        if (minDistanceToRouteLine > 805) {
                            triggerToast("Off-route deviation detected! Updating path variables...", 4000);
                            const currentGpsLocationLatLng = L.latLng(latitude, longitude);
                            const currentTargetDestinationLatLng = routingControl.getWaypoints()[1].latLng;
                            routingControl.setWaypoints([currentGpsLocationLatLng, currentTargetDestinationLatLng]);
                        }
                    }
                }, () => { isTracking = false; }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
            }
        });
    </script>
</body>
</html>
