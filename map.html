<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NC Route Planner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111827;
        }
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Force remove the text directions itinerary panel completely */
        .leaflet-routing-container, .leaflet-routing-error {
            display: none !important;
        }
        
        /* Hide scrollbars for the top category bar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 16px;
            padding: 4px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="flex flex-col justify-end">

    <div class="absolute top-0 left-0 right-0 z-10 bg-white/95 backdrop-blur-md border-b border-gray-200 safe-top shadow-md flex flex-col">
        <div class="px-4 py-2.5 flex justify-between items-center">
            <div>
                <h1 class="text-xs font-bold uppercase tracking-wider text-gray-400">Raleigh → Asheville</h1>
                <p id="status" class="text-sm font-semibold text-gray-800">Calculating corridor routes...</p>
            </div>
            <div class="flex gap-2">
                <button id="clear-cache-btn" class="bg-gray-100 active:bg-gray-200 text-gray-600 text-xs font-medium px-3 py-2 rounded-xl hidden min-h-[44px]">
                    🔄 Reset
                </button>
                <button id="geo-btn" class="bg-blue-600 active:bg-blue-700 text-white text-xs font-semibold px-4 py-2 rounded-xl shadow-sm transition-all flex items-center min-h-[44px]">
                    📍 Track Me
                </button>
            </div>
        </div>

        <div id="filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pb-2.5 pt-0.5">
            <button data-filter="all" class="filter-pill bg-blue-600 text-white text-xs font-bold px-3.5 py-1.5 rounded-lg shadow-sm whitespace-nowrap min-h-[44px]">All Stops</button>
            <button data-filter="playground" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-3.5 py-1.5 rounded-lg whitespace-nowrap min-h-[44px]">🛝 Playgrounds</button>
            <button data-filter="sheetz" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-3.5 py-1.5 rounded-lg whitespace-nowrap min-h-[44px]">⛽ Sheetz</button>
            <button data-filter="mcdonalds" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-3.5 py-1.5 rounded-lg whitespace-nowrap min-h-[44px]">🍟 McDonald's</button>
            <button data-filter="chickfila" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-3.5 py-1.5 rounded-lg whitespace-nowrap min-h-[44px]">🐔 Chick-fil-A</button>
            <button data-filter="chipotle" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-3.5 py-1.5 rounded-lg whitespace-nowrap min-h-[44px]">Burritos</button>
            <button data-filter="wendys" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-3.5 py-1.5 rounded-lg whitespace-nowrap min-h-[44px]">🍔 Wendy's</button>
            <button data-filter="jimmyjohn" class="filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-3.5 py-1.5 rounded-lg whitespace-nowrap min-h-[44px]">🥖 Jimmy John's</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="poi-loader" class="absolute bottom-6 left-4 right-4 z-10 bg-white/95 backdrop-blur-md rounded-xl p-4 shadow-xl border border-gray-100 safe-bottom hidden">
        <div class="flex items-center gap-3">
            <div class="animate-spin rounded-full h-5 w-5 border-2 border-blue-600 border-t-transparent"></div>
            <p class="text-xs font-semibold text-gray-600">Filtering all stops within 15 mins of path...</p>
        </div>
    </div>

    <script>
        const START_COORDS = [35.601832, -78.623624]; // 620 Trunecek Cir, Raleigh
        const END_COORDS = [35.5951, -82.5515];     // Asheville, NC
        const CACHE_KEY = 'nc_route_pois_v4';
        const CACHE_EXPIRY_MS = 7 * 24 * 60 * 60 * 1000;

        // Strict Bounding Box constraints restricting map panning solely to North Carolina region
        const NC_BOUNDS = L.latLngBounds([33.7, -84.4], [36.7, -75.3]);

        // Style configurations for POI Map Symbols
        const poiConfigs = {
            playground: { label: '🛝', bg: 'bg-emerald-600 border-emerald-200 text-white', name: 'Playground', img: 'https://images.unsplash.com/photo-1596464716127-f2a82984de30?auto=format&fit=crop&w=300&q=80' },
            sheetz: { label: '⛽', bg: 'bg-red-600 border-red-200 text-white', name: 'Sheetz', img: 'https://images.unsplash.com/photo-1527018601619-a508a2be00cd?auto=format&fit=crop&w=300&q=80' },
            chipotle: { label: '🌯', bg: 'bg-amber-900 border-amber-500 text-white', name: 'Chipotle', img: 'https://images.unsplash.com/photo-1562059390-a761a084768e?auto=format&fit=crop&w=300&q=80' },
            jimmyjohn: { label: '🥖', bg: 'bg-neutral-900 border-neutral-400 text-white', name: "Jimmy John's", img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=300&q=80' },
            mcdonalds: { label: '🍟', bg: 'bg-yellow-500 border-red-600 text-red-700 font-black', name: "McDonald's", img: 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=300&q=80' },
            wendys: { label: '👧', bg: 'bg-sky-500 border-sky-200 text-white', name: "Wendy's", img: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=300&q=80' },
            chickfila: { label: '🐔', bg: 'bg-red-700 border-white text-white', name: 'Chick-fil-A', img: 'https://images.unsplash.com/photo-1610614819513-58e34989848b?auto=format&fit=crop&w=300&q=80' },
            food: { label: '🍔', bg: 'bg-zinc-500 border-zinc-300 text-white', name: 'Food Stop', img: 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=300&q=80' }
        };

        let allPoiMarkers = [];
        let routeLineCoordinates = [];
        let userMarker = null;
        let activeFilter = 'all';

        // Initialize Map locked to North Carolina view bounds
        const map = L.map('map', { 
            zoomControl: false, 
            tap: true,
            maxBounds: NC_BOUNDS,
            maxBoundsViscosity: 1.0,
            minZoom: 7
        }).setView([35.75, -80.5], 8);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const createCustomIcon = (label, classes) => L.divIcon({
            html: `<div class="flex items-center justify-center w-8 h-8 rounded-full border-2 shadow-md text-sm ${classes}">${label}</div>`,
            className: '',
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -10]
        });

        // Initialize Routing Machine without directions layout panel overlay
        const routingControl = L.Routing.control({
            waypoints: [L.latLng(START_COORDS[0], START_COORDS[1]), L.latLng(END_COORDS[0], END_COORDS[1])],
            show: false,
            addWaypoints: false,
            draggableWaypoints: false,
            createMarker: (i, wp) => L.marker(wp.latLng, { icon: createCustomIcon(i === 0 ? '🏁' : '⛰️', 'bg-black border-white text-white font-bold') })
        }).addTo(map);

        routingControl.on('routesfound', function(e) {
            document.getElementById('status').innerText = "Route ready. Building stops...";
            routeLineCoordinates = e.routes[0].coordinates;
            
            // Look up device cache store
            const cachedData = localStorage.getItem(CACHE_KEY);
            const cacheTimestamp = localStorage.getItem(CACHE_KEY + '_time');
            const now = Date.now();

            if (cachedData && cacheTimestamp && (now - cacheTimestamp < CACHE_EXPIRY_MS)) {
                document.getElementById('status').innerText = "Stops active (Cached Offline)";
                document.getElementById('clear-cache-btn').classList.remove('hidden');
                processAndRenderPOIs(JSON.parse(cachedData));
            } else {
                fetchPOIsFromOverpassCorridor();
            }
        });

        // Query Overpass using a clean bounding box covering the central NC corridor line
        function fetchPOIsFromOverpassCorridor() {
            document.getElementById('poi-loader').classList.remove('hidden');

            const overpassQuery = `
                [out:json][timeout:90];
                (
                  node["brand"~"Sheetz|Chipotle|Jimmy John|McDonald's|Wendy's|Chick-fil-A",i](35.3,-82.7,36.3,-78.5);
                  node["name"~"Sheetz|Chipotle|Jimmy John|McDonald's|Wendy's|Chick-fil-A",i](35.3,-82.7,36.3,-78.5);
                  node["leisure"="playground"](35.3,-82.7,36.3,-78.5);
                  way["leisure"="playground"](35.3,-82.7,36.3,-78.5);
                );
                out center;`;

            const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(overpassQuery);

            fetch(url)
                .then(res => { if (!res.ok) throw new Error("API Busy"); return res.json(); })
                .then(data => {
                    document.getElementById('poi-loader').classList.add('hidden');
                    try {
                        localStorage.setItem(CACHE_KEY, JSON.stringify(data.elements));
                        localStorage.setItem(CACHE_KEY + '_time', Date.now().toString());
                        document.getElementById('clear-cache-btn').classList.remove('hidden');
                    } catch(e) { console.warn("Cache quota filled."); }
                    
                    document.getElementById('status').innerText = "All stops mapped successfully.";
                    processAndRenderPOIs(data.elements);
                })
                .catch(err => {
                    document.getElementById('poi-loader').classList.add('hidden');
                    document.getElementById('status').innerText = "Network slow. Using backup storage layer.";
                    const backup = localStorage.getItem(CACHE_KEY);
                    if (backup) processAndRenderPOIs(JSON.parse(backup));
                });
        }

        function getPoiCategory(tags) {
            if (tags.leisure === 'playground') return 'playground';
            const text = ((tags.name || '') + ' ' + (tags.brand || '')).toLowerCase();
            if (text.includes('sheetz')) return 'sheetz';
            if (text.includes('chipotle')) return 'chipotle';
            if (text.includes('jimmy john')) return 'jimmyjohn';
            if (text.includes('mcdonald')) return 'mcdonalds';
            if (text.includes('wendy')) return 'wendys';
            if (text.includes('chick-fil-a') || text.includes('chick fil a')) return 'chickfila';
            return 'food';
        }

        // Process matching arrays and perform client-side geodesic distance calculations
        function processAndRenderPOIs(elements) {
            allPoiMarkers.forEach(item => map.removeLayer(item.marker));
            allPoiMarkers = [];

            // Downsample route coordinates slightly for faster processing on mobile devices
            const spatialSamplingRate = 8;
            const simplifiedRoute = [];
            for(let i = 0; i < routeLineCoordinates.length; i += spatialSamplingRate) {
                simplifiedRoute.push(routeLineCoordinates[i]);
            }

            elements.forEach(element => {
                const lat = element.lat || (element.center && element.center.lat);
                const lon = element.lon || (element.center && element.center.lon);
                if (!lat || !lon) return;

                // Client-side straight-line distance filter calculation
                let minDistanceMeters = Infinity;
                for (let j = 0; j < simplifiedRoute.length; j++) {
                    const d = map.distance([lat, lon], [simplifiedRoute[j].lat, simplifiedRoute[j].lng]);
                    if (d < minDistanceMeters) minDistanceMeters = d;
                }

                // 12000 meters ~ 7.45 miles (Approx. 15 mins as the crow flies)
                if (minDistanceMeters > 12000) return;

                const tags = element.tags || {};
                const category = getPoiCategory(tags);
                const config = poiConfigs[category] || poiConfigs['food'];

                let name = tags.name || config.name;
                let hours = tags.opening_hours || "Hours not listed (Check online)";
                let description = tags.description || `Verified location off the highway corridor.`;
                let imageUrl = tags.image || config.img;

                const popupContent = `
                    <div class="max-w-[220px] font-sans p-0.5">
                        <img src="${imageUrl}" class="w-full h-24 object-cover rounded-lg mb-2 shadow-sm" onerror="this.style.display='none'">
                        <h3 class="text-xs font-bold text-gray-900">${name}</h3>
                        <p class="text-[11px] text-gray-500 leading-tight my-1">${description}</p>
                        <div class="border-t border-gray-100 pt-1.5 mt-1.5">
                            <span class="text-[9px] uppercase font-bold text-gray-400 block tracking-wider">Hours</span>
                            <p class="text-xs text-gray-700 italic font-medium">${hours}</p>
                        </div>
                    </div>
                `;

                const marker = L.marker([lat, lon], {
                    icon: createCustomIcon(config.label, config.bg)
                }).bindPopup(popupContent, { className: 'custom-popup' });

                allPoiMarkers.push({ marker: marker, category: category });

                if (activeFilter === 'all' || activeFilter === category) {
                    marker.addTo(map);
                }
            });
        }

        // Tap Slider Filter Event Handler
        document.getElementById('filter-bar').addEventListener('click', (e) => {
            const pill = e.target.closest('.filter-pill');
            if (!pill) return;

            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.className = "filter-pill bg-gray-100 text-gray-700 text-xs font-medium px-3.5 py-1.5 rounded-lg whitespace-nowrap min-h-[44px]";
            });
            pill.className = "filter-pill bg-blue-600 text-white text-xs font-bold px-3.5 py-1.5 rounded-lg shadow-sm whitespace-nowrap min-h-[44px]";
            
            activeFilter = pill.getAttribute('data-filter');

            allPoiMarkers.forEach(item => {
                if (activeFilter === 'all' || item.category === activeFilter) {
                    if (!map.hasLayer(item.marker)) item.marker.addTo(map);
                } else {
                    if (map.hasLayer(item.marker)) map.removeLayer(item.marker);
                }
            });
        });

        // Clear Cache Layout Logic
        document.getElementById('clear-cache-btn').addEventListener('click', () => {
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(CACHE_KEY + '_time');
            location.reload();
        });

        // Geolocation Engine
        const geoBtn = document.getElementById('geo-btn');
        let isTracking = false;
        let watchId = null;

        geoBtn.addEventListener('click', () => {
            if (isTracking) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                isTracking = false;
                geoBtn.innerText = "📍 Track Me";
                geoBtn.className = "bg-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-xl shadow-sm min-h-[44px]";
            } else {
                if (!navigator.geolocation) { alert("GPS unavailable."); return; }
                geoBtn.innerText = "🛑 Stop";
                geoBtn.className = "bg-red-600 text-white text-xs font-semibold px-4 py-2 rounded-xl shadow-sm min-h-[44px]";
                isTracking = true;

                watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        if (!userMarker) {
                            userMarker = L.marker([latitude, longitude], { icon: createCustomIcon('🚗', 'bg-blue-500 border-white text-white') }).addTo(map);
                        } else {
                            userMarker.setLatLng([latitude, longitude]);
                        }
                        map.panTo([latitude, longitude]);
                    },
                    (err) => {
                        alert("Please authorize location access permissions inside iOS Settings.");
                        isTracking = false;
                        geoBtn.innerText = "📍 Track Me";
                        geoBtn.className = "bg-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-xl shadow-sm min-h-[44px]";
                    },
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                );
            }
        });
    </script>
</body>
</html>
