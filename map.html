    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111827;
        }
        #map { height: 100%; width: 100%; z-index: 1; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .leaflet-routing-container, .leaflet-routing-error, .leaflet-right { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 14px; padding: 1px; max-width: 210px !important;
            overflow: hidden; background-color: #ffffff;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        .custom-popup .leaflet-popup-content { margin: 6px !important; max-width: 198px !important; }
        .custom-popup .leaflet-popup-content a, .custom-popup .leaflet-popup-content button {
            color: #ffffff !important; text-decoration: none !important;
        }
    </style>

        function buildCleanAddressString(addr, displayNameFallback) {
            if (!addr) return displayNameFallback.split(',').slice(0, 3).join(',');
            let tokens = [];
            const roadLine = addr.house_number && addr.road ? `${addr.house_number} ${addr.road}` : (addr.road || '');
            if (roadLine) tokens.push(roadLine);
            if (addr.city || addr.town || addr.village || addr.suburb) tokens.push(addr.city || addr.town || addr.village || addr.suburb);
            if (addr.state) tokens.push(addr.state);
            if (addr.postcode) tokens.push(addr.postcode);
            return tokens.length > 0 ? tokens.join(', ') : displayNameFallback.split(',').slice(0, 3).join(',');
        }

        function updateBufferVisualizerWeight() {
            if (!routeBufferPolyline || routeLineCoordinates.length === 0) return;
            const currentMapCenterLatitude = map.getCenter().lat;
            const currentZoomLevel = map.getZoom();
            const metersPerPixel = (40075016.686 * Math.cos(currentMapCenterLatitude * Math.PI / 180)) / Math.pow(2, currentZoomLevel + 8);
            const calculatedPixelWidthWidth = (activeBufferMeters / metersPerPixel) * 2;
            routeBufferPolyline.setStyle({ weight: Math.max(4, calculatedPixelWidthWidth) });
        }

        function roundCoords(num) { return Math.round(parseFloat(num) * 10000) / 10000; }

        function calculateIntersectedStates(routeCoords) {
            const matchedStates = new Set();
            const sampleRate = Math.max(1, Math.floor(routeCoords.length / 100));
            for (let i = 0; i < routeCoords.length; i += sampleRate) {
                const pt = routeCoords[i];
                for (const [stateName, bbox] of Object.entries(STATE_BOUNDS_LOOKUP)) {
                    if (pt.lat >= bbox.s && pt.lat <= bbox.n && pt.lng >= bbox.w && pt.lng <= bbox.e) {
                        matchedStates.add(stateName);
                    }
                }
            }
            return Array.from(matchedStates);
        }

        function dispatchOffThreadAnalysis() {
            if (!routeLineCoordinates || routeLineCoordinates.length === 0) return;
            const sliceRate = Math.max(8, Math.ceil(routeLineCoordinates.length / 52));
            activeTargetsSliceMemory = [];
            for(let i = 0; i < routeLineCoordinates.length; i += sliceRate) { activeTargetsSliceMemory.push(routeLineCoordinates[i]); }
            activeTargetsSliceMemory.push(routeLineCoordinates[routeLineCoordinates.length - 1]);

            if (mathWorker) {
                mathWorker.postMessage({
                    localElements: localJsonMemory, targetsSlice: activeTargetsSliceMemory, activeBufferMeters: activeBufferMeters,
                    currentMasterCat: currentMasterCat, currentSubFilter: currentSubFilter
                });
            }
        }

            navigator.geolocation.getCurrentPosition(

                    const inputEl = document.getElementById(inputId);
                    inputEl.value = "Current Location";
                    inputEl.dataset.lat = pos.coords.latitude;
                    inputEl.dataset.lon = pos.coords.longitude;
                    document.getElementById(clearBtnId).classList.remove('hidden');
                    updateInlineStatus("Current coordinates successfully applied.");
                    triggerToast("Acquired hardware GPS coordinates successfully.");
                },
                (err) => {
                    updateInlineStatus("GPS connection request rejected.");
                    triggerToast("Telemetry failure: Verify browser positioning location permissions.");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }

        function computeTargetCenteringNode() {
            if (routeLineCoordinates.length > 0 && lastUserGpsCoord) {
                const routeBoundsCenter = L.polyline(routeLineCoordinates).getBounds().getCenter();
                return L.latLng((routeBoundsCenter.lat + lastUserGpsCoord[0]) / 2, (routeBoundsCenter.lng + lastUserGpsCoord[1]) / 2);
            } else if (routeLineCoordinates.length > 0) {
                return L.polyline(routeLineCoordinates).getBounds().getCenter();
            } else if (lastUserGpsCoord) {
                return L.latLng(lastUserGpsCoord[0], lastUserGpsCoord[1]);
            }
            return map.getCenter();
        }

        // --- PHASE 3: MAP TILES CANVAS CORE SETUP DEFINITIONS ----------------
        // =====================================================================
        map = L.map('map', { zoomControl: false }).setView(MAP_INITIAL_CENTER, 5);

        mapLayersPool = {
            light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors © CARTO'

        mapLayersPool[mapStyleMode].addTo(map);

        favoritesLayerGroup = L.layerGroup().addTo(map);
        poiClusterGroup = L.layerGroup().addTo(map);

        // =====================================================================
        // --- PHASE 4: HIGH-SPEED CORRIDOR BACKGROUND WEB WORKER ENGINE -------
        // =====================================================================
        const workerBlobCode = `
            function haversineDist(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
            }

            self.onmessage = function(e) {
                const { localElements, targetsSlice, activeBufferMeters, currentMasterCat, currentSubFilter } = e.data;
                const finalMatches = [];
                if (!localElements || currentSubFilter === 'none') {
                    self.postMessage({ sortedMatches: [] });
                    return;
                }

                let minTlat = 90, maxTlat = -90, minTlon = 180, maxTlon = -180;
                for(let j=0; j<targetsSlice.length; j++) {
                    if (targetsSlice[j].lat < minTlat) minTlat = targetsSlice[j].lat;
                    if (targetsSlice[j].lat > maxTlat) maxTlat = targetsSlice[j].lat;
                    if (targetsSlice[j].lng < minTlon) minTlon = targetsSlice[j].lng;
                    if (targetsSlice[j].lng > maxTlon) maxTlon = targetsSlice[j].lng;
                }
                const degPad = (activeBufferMeters + 2000) / 111000;
                const spatialEnvelope = { n: maxTlat + degPad, s: minTlat - degPad, e: maxTlon + degPad, w: minTlon - degPad };

                localElements.forEach(el => {
                    let normBrand = el.b || '';
                    if (el.c !== currentMasterCat) return;
                    if (el.lat > spatialEnvelope.n || el.lat < spatialEnvelope.s || el.lon > spatialEnvelope.e || el.lon < spatialEnvelope.w) return;
                    
                    let isMatch = false;
                    if (currentSubFilter === 'unl87' && el.g87 === 1) isMatch = true;
                    else if (currentSubFilter === 'unl88' && el.g88 === 1) isMatch = true;
                    else if (normBrand === currentSubFilter) isMatch = true;
                    else if (el.c === currentSubFilter) isMatch = true;
                    
                    if (!isMatch) return;

                    let minD = Infinity;
                    for (let j = 0; j < targetsSlice.length; j++) {
                        const d = haversineDist(el.lat, el.lon, targetsSlice[j].lat, targetsSlice[j].lng);
                        if (d < minD) minD = d;
                    }

                    if (minD <= activeBufferMeters) {
                        finalMatches.push({
                            lat: el.lat, lon: el.lon, n: el.n, brand: normBrand, category: el.c, hours: el.h || "Hours not listed", desc: el.d || "", minD: minD, g87: el.g87, g88: el.g88
                        });
                    }
                });
                self.postMessage({ sortedMatches: finalMatches.sort((a, b) => a.minD - b.minD) });
            };
        `;
        const blobObj = new Blob([workerBlobCode], { type: 'application/javascript' });
        mathWorker = new Worker(URL.createObjectURL(blobObj));

        mathWorker.onmessage = function(e) {
            const { sortedMatches } = e.data;
            poiClusterGroup.clearLayers();
            allPoiMarkersMemoryMap = [];
            
            if (!sortedMatches || sortedMatches.length === 0) {
                updateInlineStatus("No matching pipeline facilities found within detour parameters.");
                return;
            }
            
            sortedMatches.forEach(el => { buildAndRenderPoiMarker(el); });
            
            const hud = document.getElementById('next-stop-hud');
            if (hud && sortedMatches.length > 0) {
                document.getElementById('hud-poi-name').innerText = sortedMatches[0].n || "POI Destination Element";
                const distMiles = (sortedMatches[0].minD * 0.000621371).toFixed(2);
                document.getElementById('hud-poi-dist').innerText = `${distMiles} mi away`;
                hud.classList.remove('hidden');
            }
            updateInlineStatus(`Corridor calculations ready: [Mapped ${sortedMatches.length} Facilities]`);
        };

        routingControl = L.Routing.control({
            show: false, 
            addWaypoints: true, 
            draggableWaypoints: true,
            serviceUrl: 'https://router.project-osrm.org/route/v1',
            router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
            lineOptions: {
                styles: [
                    { color: '#0f172a', opacity: 0.25, weight: 14 }, 
                    { color: '#2563eb', opacity: 0.9, weight: 10 },    
                    { color: '#60a5fa', opacity: 1, weight: 4 }      
                ]
            },
            createMarker: function(i, wp, n) {
                let iconLabel = '⚓';
                let bgClass = 'bg-blue-600 border-white text-white';
                if (i === 0) { iconLabel = '🏁'; bgClass = 'bg-emerald-600 border-white text-white'; }
                else if (i === n - 1) { iconLabel = '🛑'; bgClass = 'bg-red-600 border-white text-white'; }
                
                let marker = L.marker(wp.latLng, { draggable: true, icon: createRouteMarkerIcon(iconLabel, bgClass) });
                if (i > 0 && i < n - 1) {
                    marker.on('click', function() {
                        if (confirm("Delete this custom reroute anchor point?")) {
                            let currentWaypoints = routingControl.getWaypoints();
                            currentWaypoints.splice(i, 1);
                            routingControl.setWaypoints(currentWaypoints);
                        }
                    });
                }
                return marker;
            }
        }).addTo(map);

        // =====================================================================

        function runCachedAutocompleteSearch(inputElement, dropdownElement) {
            const query = inputElement.value.trim();
            const clearBtn = document.getElementById(inputElement.id === 'start-input' ? 'start-clear-btn' : 'end-clear-btn');
            
            if (query.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');

            if (query.length < 3) {
                dropdownElement.innerHTML = ''; dropdownElement.classList.add('hidden'); return;
            }

            if (autocompleteQueryMemoryCache.has(query)) {
                renderAutocompleteDropdownDOM(autocompleteQueryMemoryCache.get(query), inputElement, dropdownElement); return;
            }

            fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=6&addressdetails=1&countrycodes=us&q=${encodeURIComponent(query)}`)
            .then(res => { if (!res.ok) throw new Error(); return res.json(); })
            .then(data => {
                autocompleteQueryMemoryCache.set(query, data);
                renderAutocompleteDropdownDOM(data, inputElement, dropdownElement);
            }).catch(() => {});
        }

        function renderAutocompleteDropdownDOM(data, inputElement, dropdownElement) {
            dropdownElement.innerHTML = '';
            if (!data || data.length === 0) {
                const noResult = document.createElement('div');
                noResult.className = "px-3 py-2.5 bg-gray-50 text-gray-500 italic text-xs select-none rounded-xl";
                noResult.innerText = "No locations found in the US";
                dropdownElement.appendChild(noResult); dropdownElement.classList.remove('hidden'); return;
            }
            dropdownElement.classList.remove('hidden');

            data.forEach(item => {
                const cleanOutputString = buildCleanAddressString(item.address, item.display_name);
                const option = document.createElement('div');
                option.className = "px-3 py-2.5 bg-white hover:bg-blue-50 border-b border-gray-100 last:border-0 cursor-pointer truncate text-zinc-900 font-semibold text-xs transition-colors";
                option.innerText = cleanOutputString;

                option.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    inputElement.value = cleanOutputString;
                    inputElement.dataset.lat = item.lat;
                    inputElement.dataset.lon = item.lon;
                    dropdownElement.innerHTML = ''; dropdownElement.classList.add('hidden');
                    document.getElementById(inputElement.id === 'start-input' ? 'start-clear-btn' : 'end-clear-btn').classList.remove('hidden');
                });
                dropdownElement.appendChild(option);
            });
        }

                    const lat = parseFloat(this.dataset.lat);
                    const lon = parseFloat(this.dataset.lon);
                    let localStarred = JSON.parse(localStorage.getItem('starred_pois') || '[]');
                    const matchIndex = localStarred.findIndex(item => roundCoords(item.lat) === roundCoords(lat) && roundCoords(item.lon) === roundCoords(lon));
                    
                    if (matchIndex > -1) {
                        localStarred.splice(matchIndex, 1);
                        triggerToast("Removed from profile stars.");
                    } else {
                        localStarred.push({
                            lat: lat, lon: lon,
                            name: this.dataset.name,
                            category: this.dataset.cat,
                            brand: this.dataset.brand,
                            hours: this.dataset.hours,
                            desc: this.dataset.desc
                        });
                        triggerToast("Location pinned persistently to profile map layer!");
                    }
                    localStorage.setItem('starred_pois', JSON.stringify(localStarred));
                    renderGlobalPermanentStars();
                    map.closePopup();
                });
            }

            const repoDelete = containerNode.querySelector('.global-delete-trigger');
            if (repoDelete) {
                repoDelete.addEventListener('click', function() {
                    const lat = parseFloat(this.dataset.lat);
                    const lon = parseFloat(this.dataset.lon);
                    repoFavoritesMemory = repoFavoritesMemory.filter(r => !(roundCoords(r.lat) === roundCoords(lat) && roundCoords(r.lon) === roundCoords(lon)));
                    
                    let localStarred = JSON.parse(localStorage.getItem('starred_pois') || '[]');
                    localStarred = localStarred.filter(item => !(roundCoords(item.lat) === roundCoords(lat) && roundCoords(item.lon) === roundCoords(lon)));
                    localStorage.setItem('starred_pois', JSON.stringify(localStarred));
                    
                    triggerToast("Dropped location item from repository matrix.");
                    renderGlobalPermanentStars();
                    map.closePopup();
                });
            }
        });

        // =====================================================================
        // --- PHASE 9: GEOLOCATION HARDWARE WATCH TELEMETRY ENGINE -----------
        // =====================================================================
        const geoBtn = document.getElementById('geo-btn');
        geoBtn.addEventListener('click', () => {
            if (isTracking) { 
                if (watchId) navigator.geolocation.clearWatch(watchId); 
                isTracking = false; allowAutoCenter = true; clearTimeout(autoCenterTimeoutId);
                geoBtn.innerText = "🚗 Track"; geoBtn.className = "bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]"; 
            } else {
                if (!navigator.geolocation) { alert("GPS hardware unavailable."); return; }
                geoBtn.innerText = "🛑 Stop"; geoBtn.className = "bg-red-600 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow-sm min-h-[44px]"; isTracking = true;
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    
                    const startInField = document.getElementById('start-input');
                    startInField.value = "Current Location";
                    startInField.dataset.lat = latitude;
                    startInField.dataset.lon = longitude;
                    document.getElementById('start-clear-btn').classList.remove('hidden');

                    if (lastUserGpsCoord) {
                        const distanceMoved = map.distance([latitude, longitude], lastUserGpsCoord); if (distanceMoved < 25) return; 
                    }
                    
                    const currentLatLng = L.latLng(latitude, longitude);
                    lastUserGpsCoord = [latitude, longitude];
                    
                    if (!userMarker) { 
                        userMarker = L.marker([latitude, longitude], { icon: createCustomIcon('🚗', 'bg-blue-500 border-white text-white', false) }).addTo(map); 
                    } else { 
                        userMarker.setLatLng([latitude, longitude]); 
                    }
                    if (allowAutoCenter) map.panTo([latitude, longitude]);

                    // Active Stop Queue Proximity Arrival Check
                    if (stopQueue.length > 0) {
                        const distToActiveStop = map.distance(currentLatLng, L.latLng(stopQueue[0].lat, stopQueue[0].lon));
                        if (distToActiveStop < 50) { // 50 meter radius
                            triggerToast(`Arrived at stop: "${stopQueue[0].name}"`);
                            stopQueue.shift();
                            updateQueueHUD();
                            triggerRouteCalculation();
                            return; //Recalculate route and exit step calculation context safely
                        }
                    }

                    if (routeLineCoordinates.length > 0) {
                        let minDistanceToRouteLine = Infinity; let closestCoordinateIndex = 0;
                        for (let i = 0; i < routeLineCoordinates.length; i++) {
                            const d = map.distance([latitude, longitude], [routeLineCoordinates[i].lat, routeLineCoordinates[i].lng]);
                            if (d < minDistanceToRouteLine) { minDistanceToRouteLine = d; closestCoordinateIndex = i; }
                        }

                        // Client-Side Maneuver Advancement Check Logic
                        if (currentRouteInstructions.length > 0 && activeInstructionIndex < currentRouteInstructions.length - 1) {
                            const nextInstruction = currentRouteInstructions[activeInstructionIndex + 1];
                            if (nextInstruction && nextInstruction.index !== undefined) {
                                const nextTurnPoint = routeLineCoordinates[nextInstruction.index];
                                if (nextTurnPoint) {
                                    const distanceToNextTurn = map.distance(currentLatLng, [nextTurnPoint.lat, nextTurnPoint.lng]);
                                    
                                    // Step forward if user enters the turning radius zone or passes segment indices
                                    if (distanceToNextTurn < 40 || closestCoordinateIndex >= nextInstruction.index) {
                                        activeInstructionIndex++;
                                        updateDirectionsHUD();
                                    }
                                }
                            }
                        }

                        // Throttled Distance Remaining Calculation Loop: Fires exclusively every 0.5 miles (805 meters)
                        if (!lastMileageUpdateGps || map.distance(currentLatLng, lastMileageUpdateGps) >= 805) {
                            let remainingDistanceMeters = 0;
                            for (let i = closestCoordinateIndex; i < routeLineCoordinates.length - 1; i++) {
                                remainingDistanceMeters += map.distance([routeLineCoordinates[i].lat, routeLineCoordinates[i].lng], [routeLineCoordinates[i+1].lat, routeLineCoordinates[i+1].lng]);
                            }
                            const remainingDistanceMiles = (remainingDistanceMeters * 0.000621371).toFixed(1);
                            const stickyLabelValue = document.getElementById('sticky-total-dist');
                            if (stickyLabelValue) stickyLabelValue.innerText = remainingDistanceMiles;
                            
                            lastMileageUpdateGps = currentLatLng;
                        }

                        if (minDistanceToRouteLine > 805) {
                            triggerToast("Off-route deviation detected! Updating path variables...", 4000);
                            triggerRouteCalculation();
                        }
                    }
                }, () => { isTracking = false; }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
            }
        });

        // =====================================================================
        // --- PHASE 10: AUTOMATED BACKGROUND INTEGRATION LIFECYCLES -----------
        // =====================================================================
        window.addEventListener('DOMContentLoaded', () => {
            ['start-input', 'end-input'].forEach(id => {
                const el = document.getElementById(id); let debounceTimer;
                el.addEventListener('input', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        runCachedAutocompleteSearch(el, document.getElementById(id === 'start-input' ? 'start-autocomplete' : 'end-autocomplete'));
                    }, 400);
                });
                el.addEventListener('blur', () => {
                    setTimeout(() => {
                        document.getElementById(id === 'start-input' ? 'start-autocomplete' : 'end-autocomplete').classList.add('hidden');
                    }, 200);
                });
            });

            loadMasterRepoFavoritesOnBoot();

            const interactiveControlBars = ['master-filter-bar', 'sub-filter-bar', 'search-container', 'navigation-hud', 'center-loc-btn'];
            interactiveControlBars.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    L.DomEvent.on(element, 'touchstart touchmove touchend mousedown dblclick contextmenu', L.DomEvent.stopPropagation);
                    L.DomEvent.disableClickPropagation(element); L.DomEvent.disableScrollPropagation(element);
                }
            });

            map.on('movestart zoomstart dragstart', triggerAutoCenterDelay);
            map.on('zoomend moveend', updateBufferVisualizerWeight);
        });
    </script>
</body>
</html>
